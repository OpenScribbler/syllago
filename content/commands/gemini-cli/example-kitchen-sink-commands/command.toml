name = "kitchen-sink"
description = "Example Gemini CLI command demonstrating the TOML command format for testing and reference"
prompt = """
# /kitchen-sink Command

Analyze the target provided in the arguments and produce a summary.

## Arguments

{{args}}

## Instructions

1. Read the target file or directory
2. Identify the primary language and framework
3. Summarize the code structure
4. List key dependencies
5. Note any potential issues

## Output Format

Provide a structured report with:
- **Language**: Primary language detected
- **Framework**: Framework in use (if any)
- **Files**: Count of source files
- **Summary**: One-paragraph overview
- **Issues**: List of concerns (if any)
"""
