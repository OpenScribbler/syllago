name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.actor == 'holdenhewett' || github.actor == 'Open-Scribbler') &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Get Claude credentials from Aembit
        id: aembit
        uses: Aembit/get-credentials@3de1076cbb219a12107a6f3f92b2ae8bc018e618 # v1.1.1
        with:
          client-id: aembit:useast2:c7053f:identity:github_idtoken:2bbc8270-85a4-4c27-8c49-19e5590dfa87
          credential-type: ApiKey
          server-host: api.anthropic.com

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@273fe825408ddced56cb02b228a74c72bed8241e # v1
        with:
          claude_code_oauth_token: ${{ steps.aembit.outputs.api-key }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

