name: capmon — capability monitor pipeline

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Pipeline stage: fetch-extract, report, or all (default)'
        required: false
        default: ''

jobs:
  fetch-extract:
    name: Fetch + Extract (Stage 1-2)
    runs-on: ubuntu-latest
    permissions: {}
    container:
      image: chromedp/headless-shell@sha256:01b37545a4e91a53ceb52e6f88ae1be375dbeb7e2148797d4b400989ea123d3a # 148.0.7778.97
      options: --shm-size=1gb
    outputs:
      artifact-sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: cli/go.mod

      - name: Install build tools
        run: apt-get update -qq && apt-get install -y -qq make ca-certificates

      - name: Build syllago
        run: make -C cli build

      - name: Run fetch-extract stage
        run: ./cli/syllago capmon run --stage fetch-extract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROMEDP_URL: ""

      - name: Debug — workspace contents
        run: pwd && ls -la && ls -la .capmon-cache/ 2>/dev/null || echo "(no .capmon-cache/ dir)"

      - name: Compute artifact SHA-256
        id: sha
        run: |
          tar -czf .capmon-cache.tar.gz .capmon-cache/
          SHA=$(sha256sum .capmon-cache.tar.gz | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "## capmon artifact SHA-256" >> "$GITHUB_STEP_SUMMARY"
          printf '```\n%s  .capmon-cache.tar.gz\n```\n' "${SHA}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cache artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: capmon-cache
          path: .capmon-cache.tar.gz
          retention-days: 7

  report:
    name: Diff + Report (Stage 3-4)
    runs-on: ubuntu-latest
    needs: fetch-extract
    continue-on-error: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download cache artifact
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          name: capmon-cache

      - name: Verify artifact SHA-256
        env:
          EXPECTED_SHA: ${{ needs.fetch-extract.outputs.artifact-sha256 }}
        run: |
          ACTUAL=$(sha256sum .capmon-cache.tar.gz | awk '{print $1}')
          if [ "$EXPECTED_SHA" != "$ACTUAL" ]; then
            echo "SHA-256 mismatch: expected $EXPECTED_SHA, got $ACTUAL"
            exit 1
          fi
          tar -xzf .capmon-cache.tar.gz

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: cli/go.mod

      - name: Build syllago
        run: make -C cli build

      - name: Run report stage
        run: ./cli/syllago capmon run --stage report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  staleness-check:
    name: Staleness Check
    runs-on: ubuntu-latest
    needs: [fetch-extract, report]
    if: always()
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: cli/go.mod

      - name: Build syllago
        run: make -C cli build

      - name: Download cache artifact (if available)
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          name: capmon-cache
        continue-on-error: true

      - name: Extract cache (if present)
        run: tar -xzf .capmon-cache.tar.gz 2>/dev/null || true

      - name: Check staleness
        run: |
          ./cli/syllago capmon verify \
            --staleness-check \
            --threshold-hours 36
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
