name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build all targets
        working-directory: cli
        env:
          SYLLAGO_POSTHOG_KEY: ${{ secrets.SYLLAGO_POSTHOG_KEY }}
        run: |
          LDFLAGS="-X main.version=${VERSION}"
          if [ -n "$SYLLAGO_POSTHOG_KEY" ]; then
            LDFLAGS="$LDFLAGS -X github.com/OpenScribbler/syllago/cli/internal/telemetry.apiKey=$SYLLAGO_POSTHOG_KEY"
          fi
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o syllago-linux-amd64 ./cmd/syllago
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o syllago-linux-arm64 ./cmd/syllago
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o syllago-darwin-amd64 ./cmd/syllago
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o syllago-darwin-arm64 ./cmd/syllago
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o syllago-windows-amd64.exe ./cmd/syllago
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o syllago-windows-arm64.exe ./cmd/syllago

      - name: Generate commands.json, providers.json, telemetry.json, capabilities.json, and content-format.json
        working-directory: cli
        run: |
          LDFLAGS="-X main.version=${VERSION}"
          go build -ldflags "$LDFLAGS" -o syllago-gendocs ./cmd/syllago
          ./syllago-gendocs _gendocs > commands.json
          ./syllago-gendocs _genproviders > providers.json
          ./syllago-gendocs _gentelemetry > telemetry.json
          ./syllago-gendocs _gencapabilities > capabilities.json
          ./syllago-gendocs _gencontentformat > content-format.json
          rm -f syllago-gendocs

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM
        working-directory: cli
        run: syft scan dir:. --output spdx-json=sbom.spdx.json --source-name syllago --source-version "${VERSION}"

      - name: Generate checksums
        working-directory: cli
        run: |
          sha256sum syllago-linux-amd64 syllago-linux-arm64 \
            syllago-darwin-amd64 syllago-darwin-arm64 \
            syllago-windows-amd64.exe syllago-windows-arm64.exe \
            commands.json providers.json telemetry.json capabilities.json content-format.json sbom.spdx.json \
            > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign checksums
        working-directory: cli
        run: cosign sign-blob --yes checksums.txt --bundle checksums.txt.bundle

      - name: Prepare release notes
        id: notes
        run: |
          NOTES_FILE="releases/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "notes_file=$NOTES_FILE" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release (with release notes)
        if: steps.notes.outputs.notes_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        working-directory: cli
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "../$NOTES_FILE" \
            syllago-linux-amd64 syllago-linux-arm64 \
            syllago-darwin-amd64 syllago-darwin-arm64 \
            syllago-windows-amd64.exe syllago-windows-arm64.exe \
            commands.json providers.json telemetry.json capabilities.json content-format.json sbom.spdx.json \
            checksums.txt checksums.txt.bundle

      - name: Create GitHub Release (auto-generated notes)
        if: steps.notes.outputs.notes_file == ''
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: cli
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            syllago-linux-amd64 syllago-linux-arm64 \
            syllago-darwin-amd64 syllago-darwin-arm64 \
            syllago-windows-amd64.exe syllago-windows-arm64.exe \
            commands.json providers.json telemetry.json capabilities.json content-format.json sbom.spdx.json \
            checksums.txt checksums.txt.bundle

      - name: Get Homebrew tap credentials from Aembit
        id: aembit-homebrew
        continue-on-error: true
        uses: Aembit/get-credentials@652c3288eba4b0f3f03d0fee970b0d6c490f010a # v1.1.2
        with:
          client-id: aembit:useast2:c7053f:identity:github_idtoken:2bbc8270-85a4-4c27-8c49-19e5590dfa87
          credential-type: ApiKey
          server-host: github.com

      - name: Update Homebrew formula
        continue-on-error: true
        env:
          HOMEBREW_TAP_TOKEN: ${{ steps.aembit-homebrew.outputs.api-key }}
          VERSION: ${{ env.VERSION }}
          TAG_NAME: ${{ github.ref_name }}
        working-directory: cli
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "Homebrew tap token not available, skipping Homebrew update"
            exit 0
          fi

          # Extract SHA-256 for macOS binaries
          SHA_DARWIN_AMD64=$(grep syllago-darwin-amd64 checksums.txt | awk '{print $1}')
          SHA_DARWIN_ARM64=$(grep syllago-darwin-arm64 checksums.txt | awk '{print $1}')

          # Clone the tap repo
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/OpenScribbler/homebrew-tap.git" /tmp/homebrew-tap

          # Update the formula
          cd /tmp/homebrew-tap
          mkdir -p Formula

          {
            echo 'class Syllago < Formula'
            echo '  desc "AI coding tool content manager"'
            echo '  homepage "https://github.com/OpenScribbler/syllago"'
            echo "  version \"${VERSION}\""
            echo '  license "Apache-2.0"'
            echo ''
            echo '  on_macos do'
            echo '    if Hardware::CPU.arm?'
            echo "      url \"https://github.com/OpenScribbler/syllago/releases/download/${TAG_NAME}/syllago-darwin-arm64\""
            echo "      sha256 \"${SHA_DARWIN_ARM64}\""
            echo '    else'
            echo "      url \"https://github.com/OpenScribbler/syllago/releases/download/${TAG_NAME}/syllago-darwin-amd64\""
            echo "      sha256 \"${SHA_DARWIN_AMD64}\""
            echo '    end'
            echo '  end'
            echo ''
            echo '  def install'
            echo '    binary = Hardware::CPU.arm? ? "syllago-darwin-arm64" : "syllago-darwin-amd64"'
            echo '    bin.install binary => "syllago"'
            echo '  end'
            echo ''
            echo '  test do'
            echo '    assert_match version.to_s, shell_output("#{bin}/syllago version")'
            echo '  end'
            echo 'end'
          } > Formula/syllago.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/syllago.rb
          git commit -m "syllago ${TAG_NAME}"
          git push
