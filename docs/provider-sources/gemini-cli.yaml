# Gemini CLI — Provider Source Manifest
# Gold standard: public repo with JSON Schema, TS types, and full markdown docs.

schema_version: "1" # Manifest format version — bump when the schema changes
last_verified: "2026-03-28" # When URLs and data were last confirmed accurate

slug: gemini-cli
display_name: Gemini CLI
vendor: Google
status: active # active | archived | beta
fetch_tier: gh-api # gh-api | llms-txt | html-scrape
repo: google-gemini/gemini-cli
repo_branch: main

# How to detect when this provider's content has changed
change_detection:
  method: github-releases # github-releases | source-hash
  endpoint: https://api.github.com/repos/google-gemini/gemini-cli/releases/latest
  baseline: "v0.35.3"
  # As of 2026-03-27: latest stable v0.35.2, preview v0.36.0-preview.5

changelog:
  - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/changelogs/latest.md
    label: Stable changelog
  - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/changelogs/preview.md
    label: Preview changelog

# Primary config schema — covers hooks, MCP, and general settings in one file
config_schema:
  url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/schemas/settings.schema.json
  format: json-schema # json-schema | zod | rust-schemars | go-struct | none
  draft: "2020-12"
  # This single file defines hook config, MCP server config, and all settings.
  # Most content type details can be extracted from this schema alone.

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # Gemini CLI supports: rules, skills, commands, mcp, hooks, agents
  # Native agents support landed in upstream via the /agents subcommand and
  # subagents.md / remote-agents.md documentation. Files live at
  # .gemini/agents/<name>.md (project) and ~/.gemini/agents/<name>.md (user).
  # ─────────────────────────────────────────────────────────────────────

  rules:
    # Settings file: ~/.gemini/GEMINI.md (user), .gemini/GEMINI.md (project)
    # Format: plain markdown, no frontmatter. Supports @file.md imports.
    sources:
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/gemini-md.md
        type: docs # schema | source-code | docs | example
        format: markdown
        extracts: [file_format, file_locations, hierarchy, features]

  hooks:
    sources:
      # Primary: TypeScript enum defines all event names and I/O interfaces
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/packages/core/src/hooks/types.ts
        type: source-code
        format: typescript
        extracts: [event_names, event_io_schemas, hook_config_fields, hook_decisions]

      # Secondary: JSON Schema section for hook config structure
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/schemas/settings.schema.json
        type: schema
        format: json-schema
        json_path: "$.properties.hooks" # JSONPath to the relevant section
        extracts: [hook_config_fields, matcher_format]

      # Docs: human-readable reference with examples
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/hooks/index.md
        type: docs
        format: markdown
        extracts: [event_table, config_examples, env_vars]

      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/hooks/reference.md
        type: docs
        format: markdown
        extracts: [event_io_schemas, exit_codes, matcher_format]

  mcp:
    sources:
      # Primary: JSON Schema definition for MCPServerConfig
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/schemas/settings.schema.json
        type: schema
        format: json-schema
        json_path: "$.$defs.MCPServerConfig"
        extracts: [server_config_fields, transport_types, auth_options]

      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/tools/mcp-server.md
        type: docs
        format: markdown
        extracts: [transport_types, config_examples]

      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/tutorials/mcp-setup.md
        type: docs
        format: markdown
        extracts: [setup_examples]

  skills:
    sources:
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/creating-skills.md
        type: docs
        format: markdown
        extracts: [file_format, frontmatter_fields, file_locations, discovery_rules]
    # Format: SKILL.md with YAML frontmatter (name, description).
    # Dirs: .gemini/skills/ (project), ~/.gemini/skills/ (user). Also discovers .agents/skills/.
    # Note: directory paths sourced from codebase, not the linked docs page.

  agents:
    sources:
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/core/subagents.md
        type: docs
        format: markdown
        extracts: [file_format, frontmatter_fields, file_locations, invocation_patterns, tool_restrictions, model_selection, per_agent_mcp]
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/core/remote-agents.md
        type: docs
        format: markdown
        extracts: [file_format, frontmatter_fields, remote_kind, transport_options]
    # Format: Markdown files with YAML frontmatter at .gemini/agents/<name>.md
    # (project) and ~/.gemini/agents/<name>.md (user/global). Frontmatter fields:
    # name, description, kind (local|remote), model, temperature, tools[], mcpServers{}.
    # Recursion is explicitly prevented — subagents cannot spawn other subagents.

  commands:
    sources:
      - url: https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/custom-commands.md
        type: docs
        format: markdown
        extracts: [file_format, config_fields, file_locations, features]
    # Format: TOML files in .gemini/commands/. Fields: prompt (required), description (optional).
    # Supports {{args}} placeholder, !{...} shell injection, subdirectory namespacing.
