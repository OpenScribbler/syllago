# Kiro — Provider Source Manifest
# Scrape-only: closed source, no public repo, no llms.txt. All data from hosted docs.
# Fastest-changing provider — docs structure and features are unstable. Treat all data as best-effort.

schema_version: "1"
last_verified: "2026-03-27"
provider_version: "" # No public version tracking

slug: kiro
display_name: Kiro
vendor: AWS
status: beta
fetch_tier: html-scrape
# No useful public repo. aws-samples/sample-kiro-assistant has minimal samples only.

change_detection:
  method: content-hash
  endpoint: https://kiro.dev/docs/
  # No releases API, no public repo. Content hash the docs pages.

content_types:

  rules:
    sources:
      - url: https://kiro.dev/docs/steering/
        type: docs
        format: html
        extracts: [file_format, file_locations]
    # Format: .kiro/steering/ directory.

  hooks:
    sources:
      - url: https://kiro.dev/docs/hooks/
        type: docs
        format: html
        extracts: [event_names, hook_config_fields]
    # Events: Pre Tool Use, Post Tool Use, Prompt Submit, Agent Stop, File Save,
    #   File Create, File Delete, Manual Trigger, Pre/Post Task Execution.

  mcp:
    sources:
      - url: https://kiro.dev/docs/mcp/configuration/
        type: docs
        format: html
        extracts: [server_config_fields, config_examples]

  skills:
    sources:
      - url: https://kiro.dev/docs/powers/create/
        type: docs
        format: html
        extracts: [file_format, features]
    # Kiro calls skills "powers".

  agents:
    sources:
      - url: https://kiro.dev/docs/cli/custom-agents/configuration-reference/
        type: docs
        format: html
        extracts: [config_fields, file_format]

  commands:
    supported: false
