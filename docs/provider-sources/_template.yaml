# {Provider Name} — Provider Source Manifest
# {One-line description of source quality and what's available.}

schema_version: "1" # Manifest format version — bump when the schema changes
last_verified: "YYYY-MM-DD" # When URLs and data were last confirmed accurate

slug: provider-slug # Lowercase kebab-case, matches syllago provider ID
display_name: Provider Name
vendor: Vendor Name
status: active # active | archived | beta
fetch_tier: gh-api # gh-api | llms-txt | html-scrape

# --- GitHub repo (omit if closed-source) ---
repo: owner/repo # GitHub owner/repo
repo_branch: main # Default branch name

# --- For archived providers only (omit otherwise) ---
# successor:
#   slug: new-provider-slug
#   repo: owner/new-repo

# How to detect when this provider's content has changed
change_detection:
  method: github-releases # github-releases | source-hash
  endpoint: "" # Required for github-releases (releases API); informational for source-hash (primary docs landing URL)
  baseline: "" # github-releases: pinned release tag (e.g. "v2.1.86"); source-hash: omit — per-source baselines live in docs/provider-formats/<slug>.yaml

# Changelog sources for human review and release tracking
changelog:
  - url: ""
    label: ""

# Primary config schema (omit if provider has no machine-readable schema)
# Some providers publish a single schema covering hooks, MCP, and settings.
# When present, the pipeline can extract multiple content types from this one file.
# config_schema:
#   url: ""
#   format: json-schema # json-schema | zod | rust-schemars | go-struct | none
#   draft: "" # JSON Schema draft version if applicable (e.g., "2020-12", "draft-07")

content_types:

  # --- Rules / Instructions ---
  # How the provider handles project-level and user-level instructions.
  rules:
    sources:
      - url: ""
        type: docs # schema | source-code | docs | example
        format: markdown # json-schema | typescript | rust | go | markdown | toml | yaml | json
        extracts: [] # What data this URL provides. Common values:
                      # file_format, file_locations, hierarchy, features,
                      # frontmatter_fields, discovery_rules, config_fields
    # Format notes: {describe the rules file format, locations, and hierarchy}

  # --- Hooks ---
  # Lifecycle hooks for tool use, session events, etc.
  hooks:
    # Set to false and remove sources if hooks are not supported:
    # supported: false
    sources:
      - url: ""
        type: source-code
        format: typescript
        extracts: [event_names, event_io_schemas, hook_config_fields]
    # Events: {list event names}
    # Hook types: {command, prompt, agent, etc.}

  # --- MCP ---
  # Model Context Protocol server configuration.
  mcp:
    sources:
      - url: ""
        type: docs
        format: markdown
        extracts: [server_config_fields, transport_types]
    # Transports: {stdio, SSE, HTTP, etc.}
    # Config file: {where MCP config lives}

  # --- Skills ---
  # Reusable prompt-based capabilities.
  skills:
    # Set to false and remove sources if skills are not supported:
    # supported: false
    sources:
      - url: ""
        type: docs
        format: markdown
        extracts: [file_format, frontmatter_fields, file_locations]

  # --- Agents ---
  # User-definable agent configurations or profiles.
  agents:
    # Set to false and remove sources if agents are not supported:
    # supported: false
    sources:
      - url: ""
        type: docs
        format: markdown
        extracts: [file_format, config_fields]

  # --- Commands ---
  # Custom slash commands or user-definable commands.
  commands:
    # Set to false and remove sources if commands are not supported:
    # supported: false
    sources:
      - url: ""
        type: docs
        format: markdown
        extracts: [file_format, config_fields, file_locations]

# --- Source entry reference ---
#
# Each source entry in a content type has these fields:
#
#   url:        Full URL to fetch (raw.githubusercontent.com for GitHub, docs site for hosted)
#   type:       What kind of source this is
#               - schema:      Machine-readable schema (JSON Schema, Zod, etc.)
#               - source-code: Source file defining types/enums (TS, Rust, Go)
#               - docs:        Human-readable documentation (markdown, MDX, HTML)
#               - example:     Example files showing the format in use
#   format:     File format (json-schema, typescript, rust, go, markdown, toml, yaml, json)
#   extracts:   List of data types this URL provides (helps pipeline know what to parse for)
#   json_path:  (Optional) JSONPath to relevant section within a larger file
#
# Common extracts values:
#   event_names, event_io_schemas, event_table — hook events
#   hook_config_fields, hook_decisions, matcher_format — hook configuration
#   server_config_fields, transport_types, auth_options — MCP
#   file_format, file_locations, hierarchy, discovery_rules — content structure
#   frontmatter_fields, config_fields, config_examples — schema/config
#   setup_examples, env_vars, exit_codes, features — supplementary
