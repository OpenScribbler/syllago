# Codex (OpenAI) — Provider Source Manifest
# Excellent sources: Rust monorepo with JSON Schema, generated TS types, and per-event hook schemas.

schema_version: "1"
last_verified: "2026-03-27"

slug: codex
display_name: Codex
vendor: OpenAI
status: active
fetch_tier: gh-api
repo: openai/codex
repo_branch: main

change_detection:
  method: github-releases
  endpoint: https://api.github.com/repos/openai/codex/releases/latest
  baseline: "rust-v0.117.0" # Latest stable. Alpha: rust-v0.118.0-alpha.3

changelog:
  # CHANGELOG.md is a stub redirecting to GitHub releases. Uses git-cliff (cliff.toml).
  - url: https://github.com/openai/codex/releases
    label: GitHub Releases

config_schema:
  url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/core/config.schema.json
  format: json-schema
  draft: "draft-07"
  # Config file: ~/.codex/config.toml (TOML, not JSON)
  # Covers hooks, MCP, skills, agents, and general settings.

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # Codex supports: rules, skills, agents, commands, mcp, hooks
  # Not supported: (none)
  # Syllago support: rules ✓, skills ✓, agents ✓, commands ✓, mcp ✓, hooks ✓
  # commands source is a stub doc (mostly redirects to external site). 5 hook events via JSON Schema.
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://raw.githubusercontent.com/openai/codex/main/docs/agents_md.md
        type: docs
        format: markdown
        extracts: [file_format, hierarchy, features]
        # Note: stub doc, mostly redirects to developers.openai.com/codex/guides/agents-md

      - url: https://raw.githubusercontent.com/openai/codex/main/AGENTS.md
        type: example
        format: markdown
        extracts: [file_format]
    # Format: AGENTS.md (hierarchical markdown). Supports child_agents_md feature flag.

  hooks:
    sources:
      # Generated JSON schemas per hook event — gold standard for deterministic parsing
      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/pre-tool-use.command.input.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/pre-tool-use.command.output.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/post-tool-use.command.input.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/post-tool-use.command.output.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/session-start.command.input.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/session-start.command.output.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/user-prompt-submit.command.input.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/user-prompt-submit.command.output.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/stop.command.input.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/schema/generated/stop.command.output.schema.json
        type: schema
        format: json-schema
        extracts: [event_io_schemas]

      # TypeScript type definitions for event names and handler config
      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/app-server-protocol/schema/typescript/v2/HookEventName.ts
        type: source-code
        format: typescript
        extracts: [event_names]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/app-server-protocol/schema/typescript/v2/HookHandlerType.ts
        type: source-code
        format: typescript
        extracts: [hook_config_fields]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/app-server-protocol/schema/typescript/v2/HookExecutionMode.ts
        type: source-code
        format: typescript
        extracts: [hook_config_fields]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/app-server-protocol/schema/typescript/v2/HookScope.ts
        type: source-code
        format: typescript
        extracts: [hook_config_fields]

      # Rust source for config parsing and runtime types
      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/src/engine/config.rs
        type: source-code
        format: rust
        extracts: [hook_config_fields, matcher_format]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/hooks/src/types.rs
        type: source-code
        format: rust
        extracts: [event_io_schemas]
    # 5 events: PreToolUse, PostToolUse, SessionStart, UserPromptSubmit, Stop (PascalCase wire names)
    # Handler types: command, prompt, agent. Execution modes: sync, async. Scopes: thread, turn.

  mcp:
    sources:
      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/core/config.schema.json
        type: schema
        format: json-schema
        json_path: "$.$defs.RawMcpServerConfig"
        extracts: [server_config_fields, transport_types, auth_options]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/docs/codex_mcp_interface.md
        type: docs
        format: markdown
        extracts: [transport_types, config_examples]
    # Config format: TOML [mcp_servers.<name>]. Transports: stdio, SSE/HTTP (url).
    # Fields include OAuth, bearer tokens, tool enable/disable, per-tool approval mode.

  skills:
    sources:
      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/core-skills/src/model.rs
        type: source-code
        format: rust
        extracts: [file_format, frontmatter_fields, config_fields]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/core-skills/src/loader.rs
        type: source-code
        format: rust
        extracts: [discovery_rules, file_locations]

      - url: https://raw.githubusercontent.com/openai/codex/main/docs/skills.md
        type: docs
        format: markdown
        extracts: [file_format]
        # Note: stub doc, mostly redirects to developers.openai.com
    # Format: SKILL.md with YAML frontmatter (name, description, short-description).
    # Optional companion agents/openai.yaml with interface metadata.
    # Scanned recursively (max depth 6).

  agents:
    sources:
      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/core/config.schema.json
        type: schema
        format: json-schema
        json_path: "$.$defs.AgentRoleToml"
        extracts: [config_fields]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/core/src/agent/role.rs
        type: source-code
        format: rust
        extracts: [config_fields, file_format]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/core/src/agent/builtins/awaiter.toml
        type: example
        format: toml
        extracts: [config_fields]

      - url: https://raw.githubusercontent.com/openai/codex/main/codex-rs/core/src/agent/builtins/explorer.toml
        type: example
        format: toml
        extracts: [config_fields]
    # Agent config fields: config_file, description, nickname_candidates.
    # Global settings: max_depth, max_threads, job_max_runtime_seconds.

  commands:
    sources:
      - url: https://raw.githubusercontent.com/openai/codex/main/docs/slash_commands.md
        type: docs
        format: markdown
        extracts: [file_format]
        # Note: stub doc, redirects to developers.openai.com/codex
    # No detailed source for custom command format in repo.
