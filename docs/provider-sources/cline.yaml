# Cline — Provider Source Manifest
# Good sources: public VS Code extension repo with Zod schemas, hook system, and MDX docs.

schema_version: "1"
last_verified: "2026-03-27"
provider_version: "v3.76.0"

slug: cline
display_name: Cline
vendor: Cline (saoudrizwan)
status: active
fetch_tier: gh-api
repo: cline/cline
repo_branch: main

change_detection:
  method: github-releases
  endpoint: https://api.github.com/repos/cline/cline/releases/latest

changelog:
  - url: https://raw.githubusercontent.com/cline/cline/main/CHANGELOG.md
    label: Changelog

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # Cline supports: rules, hooks, mcp, skills (via cross-provider SKILL.md convention), commands (CLI-only slash commands, not user-definable files)
  # Not supported: agents (no agent file format)
  # Syllago: rules ✓, hooks ✓, mcp ✓ | skills ✗, commands ✗ (not yet implemented in syllago for cline)
  #   Syllago implements rules/hooks/mcp for cline. Skills and commands are tracked in manifest for monitoring purposes — syllago install not yet supported.
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://raw.githubusercontent.com/cline/cline/main/docs/customization/cline-rules.mdx
        type: docs
        format: markdown
        extracts: [file_format, file_locations, hierarchy, features]
    # Format: .clinerules/ directory with .md and .txt files (concatenated).
    # Global: ~/Documents/Cline/Rules/. Numeric prefixes for ordering.
    # Cross-tool compat: also reads .cursorrules, .windsurfrules, AGENTS.md.

  hooks:
    sources:
      - url: https://raw.githubusercontent.com/cline/cline/main/src/core/hooks/hook-factory.ts
        type: source-code
        format: typescript
        extracts: [event_names, hook_config_fields]

      - url: https://raw.githubusercontent.com/cline/cline/main/src/core/hooks/hook-executor.ts
        type: source-code
        format: typescript
        extracts: [hook_config_fields, event_io_schemas]

      - url: https://raw.githubusercontent.com/cline/cline/main/src/core/hooks/templates.ts
        type: source-code
        format: typescript
        extracts: [event_io_schemas, config_examples]

      - url: https://raw.githubusercontent.com/cline/cline/main/docs/customization/hooks.mdx
        type: docs
        format: markdown
        extracts: [event_table, config_examples, features]
    # 9 events: TaskStart, TaskResume, TaskCancel, TaskComplete, PreToolUse,
    #           PostToolUse, UserPromptSubmit, Notification, PreCompact
    # Hook I/O: JSON via stdin → JSON to stdout ({cancel, contextModification?, errorMessage?}).
    # Shell scripts (bash/PowerShell). 30s timeout. 50KB max context modification.
    # Stored in .clinerules/hooks/ (project) or ~/Documents/Cline/Hooks/ (global).

  mcp:
    sources:
      - url: https://raw.githubusercontent.com/cline/cline/main/src/services/mcp/schemas.ts
        type: source-code
        format: typescript
        extracts: [server_config_fields, transport_types]

      - url: https://raw.githubusercontent.com/cline/cline/main/src/services/mcp/McpHub.ts
        type: source-code
        format: typescript
        extracts: [server_config_fields, transport_types]

      - url: https://raw.githubusercontent.com/cline/cline/main/src/shared/mcp.ts
        type: source-code
        format: typescript
        extracts: [server_config_fields]

      - url: https://raw.githubusercontent.com/cline/cline/main/docs/mcp/adding-and-configuring-servers.mdx
        type: docs
        format: markdown
        extracts: [config_examples, setup_examples]
    # Settings file: cline_mcp_settings.json (VS Code globalStoragePath).
    # Transports: stdio, SSE, streamableHttp (camelCase).
    # Fields: autoApprove[], disabled, timeout (default 60s).

  skills:
    sources:
      - url: https://raw.githubusercontent.com/cline/cline/main/.agents/skills/create-pull-request/SKILL.md
        type: example
        format: markdown
        extracts: [file_format, frontmatter_fields]
    # Format: .agents/skills/*/SKILL.md. No formal schema — follows cross-tool SKILL.md convention.

  agents:
    supported: false

  commands:
    sources:
      - url: https://raw.githubusercontent.com/cline/cline/main/cli/src/utils/slash-commands.ts
        type: source-code
        format: typescript
        extracts: [config_fields]
    # CLI slash commands only — no user-definable command files.
