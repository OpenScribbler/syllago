# Amp — Provider Source Manifest
# Mixed sources: GitHub example/guide repos + minimal llms.txt stub. Docs are thin.

schema_version: "1"
last_verified: "2026-03-27"
provider_version: "" # No public version tracking

slug: amp
display_name: Amp
vendor: Sourcegraph
status: active
fetch_tier: gh-api
repo: sourcegraph/amp-examples-and-guides
repo_branch: main

change_detection:
  method: github-commits
  endpoint: https://api.github.com/repos/sourcegraph/amp-examples-and-guides/commits
  # Also track sourcegraph/amp-contrib for community tools.

changelog:
  - url: https://ampcode.com/llms.txt
    label: llms.txt (stub — only 2 URLs)

content_types:
  # ── Support summary ───────────────────────────────────────────────────
  # Amp supports: rules, skills, mcp, hooks
  # Not supported: agents (no agent file format), commands (no custom command system)
  # Syllago support: rules ✓, skills ✓, mcp ✓, hooks ✓; agents ✗, commands ✗
  # Amp uses AGENT.md (rules), .amp/settings.json (mcp/hooks). Skills follow Agent Skills open standard.
  # Hooks are config-based (amp.hooks JSON array), not file-based — managed via JSON merge.
  # ─────────────────────────────────────────────────────────────────────

  rules:
    sources:
      - url: https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/AGENT.md
        type: example
        format: markdown
        extracts: [file_format]

      - url: https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/guides/agent-file/AGENT.md
        type: docs
        format: markdown
        extracts: [file_format, features]

      - url: https://ampcode.com/manual/AGENTS.md
        type: docs
        format: markdown
        extracts: [file_format, features]
    # Format: AGENT.md (plain markdown). Amp's equivalent of CLAUDE.md/.cursorrules.

  hooks:
    sources:
      - url: https://ampcode.com/manual/hooks.md
        type: docs
        format: markdown
        extracts: [config_schema, event_names, match_conditions]

      - url: https://ampcode.com/manual/appendix/permissions-reference.md
        type: docs
        format: markdown
        extracts: [permissions_schema, match_conditions]
    # Amp supports hooks via amp.hooks array in settings JSON (tool:pre-execute / tool:post-execute).
    # NOT file-based — stored as JSON config entries. Syllago manages via JSON merge into settings.

  mcp:
    sources:
      - url: https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/guides/mcp/amp-mcp-setup-guide.md
        type: docs
        format: markdown
        extracts: [config_examples, setup_examples]

      - url: https://ampcode.com/manual/mcp.md
        type: docs
        format: markdown
        extracts: [config_schema, features]

      - url: https://ampcode.com/manual/appendix/mcp-registry-allowlist.md
        type: docs
        format: markdown
        extracts: [allowlist_schema, registry_config]

  skills:
    sources:
      - url: https://ampcode.com/manual/agent-skills.md
        type: docs
        format: markdown
        extracts: [file_format, frontmatter_fields, file_locations, discovery_rules]
    # Format: SKILL.md with YAML frontmatter (name + description required). Follows Agent Skills open standard.

  agents:
    supported: false
    # No dedicated agent file format beyond AGENT.md.

  commands:
    supported: false

  # Additional repos worth monitoring:
  # - sourcegraph/amp-contrib: community tools, slash commands, skills
  # - sourcegraph/amp-sdk-demo: SDK usage examples
