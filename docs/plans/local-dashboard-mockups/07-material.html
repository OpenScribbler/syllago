<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Syllago · Material</title>
  <link rel="stylesheet" href="./shared/tokens.css" />
  <style>
    body {
      font-family: "Inter", var(--font-sans); font-size: 14px; line-height: 1.55;
      background: var(--bg-2);
    }
    @media (prefers-color-scheme: dark) { :root:not([data-theme]) body { background: var(--bg); } }
    [data-theme="dark"] body { background: var(--bg); }

    .app-bar {
      height: 64px; display: flex; align-items: center;
      padding: 0 24px; background: var(--bg);
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
      gap: 24px; position: sticky; top: 0; z-index: 10;
    }
    .brand { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--ac-cyan), var(--ac-purple));
    }
    .spacer { flex: 1; }
    .search {
      width: 420px; height: 40px; border-radius: 999px;
      background: var(--bg-2); border: 1px solid var(--ui-2);
      display: flex; align-items: center; gap: 10px; padding: 0 18px;
      color: var(--tx-2); font-size: 14px;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .search:focus-within {
      background: var(--bg); border-color: var(--ac-blue);
      box-shadow: 0 0 0 3px var(--tint-blue);
    }
    .search input { flex: 1; background: transparent; border: 0; color: var(--tx); font: inherit; outline: 0; }
    .search input::placeholder { color: var(--tx-2); }
    .search .kbd {
      padding: 2px 8px; font-size: 11px; border-radius: 6px;
      background: var(--bg); border: 1px solid var(--ui-2);
      color: var(--tx-3); font-family: var(--font-mono);
    }
    .toggle {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--tx-2); font-size: 18px;
    }
    .toggle:hover { background: var(--bg-2); }

    .shell { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 64px); }
    .rail {
      padding: 16px 12px; background: var(--bg);
      box-shadow: 1px 0 0 var(--ui-2);
    }
    .rail h4 {
      margin: 18px 16px 8px; font-size: 11px; color: var(--tx-3);
      text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
    }
    .rail ul { list-style: none; padding: 0; margin: 0; }
    .rail li { margin: 2px 0; }
    .rail button.nav {
      display: flex; align-items: center; justify-content: space-between; width: 100%;
      padding: 10px 16px; border-radius: 12px; color: var(--tx); text-align: left;
    }
    .rail button.nav:hover { background: var(--bg-2); }
    .rail button.nav.active {
      background: var(--tint-blue); color: var(--ac-blue); font-weight: 600;
    }
    .rail button.nav .count { color: var(--tx-3); font-size: 12px; }
    .rail button.nav.active .count { color: var(--ac-blue); }

    main { padding: 32px 40px 60px; }
    h1 { font-size: 32px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.015em; }
    .sub { color: var(--tx-2); margin-bottom: 24px; }

    .chip-row {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center;
    }
    .chip-row .label {
      font-size: 11px; color: var(--tx-2); text-transform: uppercase;
      letter-spacing: 0.1em; font-weight: 600; padding-right: 4px;
    }
    .chip {
      padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 500;
      background: var(--bg); border: 1px solid var(--ui-2); color: var(--tx-2);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .chip .n {
      padding: 0 6px; font-size: 10px; font-weight: 600;
      background: var(--bg-2); border-radius: 999px; color: var(--tx-3);
    }
    .chip.active {
      background: var(--tint-blue); color: var(--ac-blue); border-color: transparent; font-weight: 600;
    }
    .chip.active .n { background: var(--ac-blue); color: var(--bg); }
    .chip:hover { border-color: var(--ac-blue); }

    .count-line { color: var(--tx-2); margin: 20px 0 12px; font-size: 13px; }
    .count-line b { color: var(--tx); font-weight: 600; }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--bg); border-radius: 16px; padding: 20px 22px;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .card:hover {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 10px 20px -5px rgba(0, 0, 0, 0.06);
      transform: translateY(-2px);
    }
    .card .top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; color: var(--ac-cyan);
      background: var(--tint-cyan);
    }
    .card.skills   .icon { color: var(--ac-blue);    background: var(--tint-blue); }
    .card.agents   .icon { color: var(--ac-purple);  background: var(--tint-purple); }
    .card.commands .icon { color: var(--ac-green);   background: var(--tint-green); }
    .card.hooks    .icon { color: var(--ac-orange);  background: var(--tint-orange); }
    .card.mcp      .icon { color: var(--ac-magenta); background: var(--tint-magenta); }
    .card.loadouts .icon { color: var(--ac-red);     background: var(--tint-red); }

    .card h3 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.005em; }
    .card .type-label { font-size: 12px; color: var(--tx-2); text-transform: capitalize; }
    .card .desc { margin: 0 0 16px; color: var(--tx-2); font-size: 13px; line-height: 1.5; }
    .card .footer {
      display: flex; gap: 12px; padding-top: 12px;
      border-top: 1px solid var(--ui-2);
      font-size: 12px; color: var(--tx-3);
    }

    .empty {
      background: var(--bg); border-radius: 16px; padding: 60px 20px;
      text-align: center; color: var(--tx-2); border: 1px dashed var(--ui-2);
    }
    .empty h3 { margin: 0 0 8px; font-size: 18px; color: var(--tx); }
    .empty .clear {
      margin-top: 16px; padding: 8px 18px; border-radius: 999px;
      background: var(--tint-blue); color: var(--ac-blue); font-weight: 600; font-size: 13px;
    }
  </style>
</head>
<body>
  <header class="app-bar">
    <div class="brand"><div class="brand-mark"></div> syllago</div>
    <div class="spacer"></div>
    <div class="search">
      <span>⌕</span>
      <input id="searchInput" placeholder="Search catalog, providers, registries…" />
      <span class="kbd">⌘K</span>
    </div>
    <button class="toggle" id="themeBtn">☾</button>
  </header>

  <div class="shell">
    <aside class="rail">
      <h4>Workspace</h4>
      <ul>
        <li><button class="nav active">Catalog <span class="count">8</span></button></li>
        <li><button class="nav">Providers <span class="count">4</span></button></li>
        <li><button class="nav">Registries <span class="count">1</span></button></li>
        <li><button class="nav">Loadouts <span class="count">1</span></button></li>
      </ul>
      <h4>Filter by type</h4>
      <ul id="typeSide"></ul>
      <h4>Filter by origin</h4>
      <ul id="originSide"></ul>
    </aside>

    <main>
      <h1>Catalog</h1>
      <div class="sub">Browse content installed in your library and available in registries.</div>

      <div class="chip-row" id="typeChips"></div>
      <div class="chip-row" id="originChips"></div>

      <div class="count-line">
        Showing <b id="countShown">8</b> of <b>8</b> items
        <span id="activeFilter"></span>
      </div>

      <section class="grid" id="grid"></section>
      <div id="empty" class="empty" style="display:none">
        <h3>No matches</h3>
        <div>Try a different search or <span id="emptyHint">clear filters</span>.</div>
        <button class="clear" id="clearBtn">Clear all filters</button>
      </div>
    </main>
  </div>

  <script src="./shared/data.js"></script>
  <script src="./shared/render.js"></script>
  <script src="./shared/filter.js"></script>
  <script>
    const state = createFilterState();
    const typeCounts   = countBy(MOCK_CATALOG, "type");
    const originCounts = countBy(MOCK_CATALOG, "origin");

    function buildChipRow(container, key, label, values, counts) {
      clear(container);
      container.appendChild(el("span", { class: "label" }, label));
      container.appendChild(el("button", { class: "chip", "data-val": "all" },
        [el("span", {}, "All"), el("span", { class: "n" }, String(MOCK_CATALOG.length))]));
      values.forEach(v => {
        container.appendChild(el("button", { class: "chip", "data-val": v },
          [el("span", {}, v[0].toUpperCase() + v.slice(1)), el("span", { class: "n" }, String(counts[v]))]));
      });
      container.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => { state[key] = btn.dataset.val; render(); });
      });
    }

    function buildSideList(container, key, values, counts) {
      clear(container);
      container.appendChild(el("li", {}, el("button", { class: "nav", "data-val": "all" },
        [el("span", {}, "All"), el("span", { class: "count" }, String(MOCK_CATALOG.length))])));
      values.forEach(v => {
        container.appendChild(el("li", {}, el("button", { class: "nav", "data-val": v },
          [el("span", {}, v[0].toUpperCase() + v.slice(1)), el("span", { class: "count" }, String(counts[v]))])));
      });
      container.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => { state[key] = btn.dataset.val; render(); });
      });
    }

    buildChipRow(document.getElementById("typeChips"),   "type",   "Type",   Object.keys(typeCounts),   typeCounts);
    buildChipRow(document.getElementById("originChips"), "origin", "Origin", Object.keys(originCounts), originCounts);
    buildSideList(document.getElementById("typeSide"),   "type",   Object.keys(typeCounts),   typeCounts);
    buildSideList(document.getElementById("originSide"), "origin", Object.keys(originCounts), originCounts);

    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const emptyHint = document.getElementById("emptyHint");
    const countShown = document.getElementById("countShown");
    const activeFilter = document.getElementById("activeFilter");

    function render() {
      const filtered = applyFilter(state, MOCK_CATALOG);
      clear(grid);
      filtered.forEach(i => {
        grid.appendChild(el("article", { class: "card " + i.type }, [
          el("div", { class: "top" }, [
            el("div", { class: "icon" }, i.type[0].toUpperCase()),
            el("div", {}, [
              el("h3", {}, i.name),
              el("div", { class: "type-label" }, i.type + " · " + i.origin),
            ]),
          ]),
          el("p", { class: "desc" }, i.description),
          el("div", { class: "footer" }, [
            el("span", {}, i.provider),
            el("span", {}, i.files + " files"),
            el("span", {}, i.size),
            el("span", {}, i.updated),
          ]),
        ]));
      });
      countShown.textContent = String(filtered.length);
      const bits = [];
      if (state.type !== "all") bits.push('type: ' + state.type);
      if (state.origin !== "all") bits.push('origin: ' + state.origin);
      if (state.query) bits.push('"' + state.query + '"');
      activeFilter.textContent = bits.length ? "  ·  " + bits.join(" · ") : "";
      empty.style.display = filtered.length === 0 ? "block" : "none";
      emptyHint.textContent = state.query ? 'clear "' + state.query + '"' : "clear filters";
      document.querySelectorAll("[data-val]").forEach(btn => {
        const row = btn.closest(".chip-row, ul");
        if (!row) return;
        let key;
        if (row.id === "typeChips" || row.id === "typeSide") key = "type";
        else if (row.id === "originChips" || row.id === "originSide") key = "origin";
        else return;
        btn.classList.toggle("active", btn.dataset.val === state[key]);
      });
    }

    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener("input", e => { state.query = e.target.value; render(); });
    searchInput.addEventListener("keydown", e => {
      if (e.key === "Escape") { searchInput.value = ""; state.query = ""; render(); searchInput.blur(); }
    });
    document.addEventListener("keydown", e => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); searchInput.focus(); searchInput.select(); }
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      state.query = ""; state.type = "all"; state.origin = "all";
      searchInput.value = ""; render();
    });

    render();
    initThemeToggle("themeBtn");
  </script>
</body>
</html>
