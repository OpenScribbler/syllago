<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Syllago · Cyberpunk</title>
  <link rel="stylesheet" href="./shared/tokens.css" />
  <style>
    body {
      font-family: var(--font-mono); font-size: 13px; line-height: 1.5;
      background: var(--bg);
      background-image:
        linear-gradient(rgba(58, 169, 159, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58, 169, 159, 0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      color: var(--tx);
    }
    [data-theme="light"] body {
      background-image:
        linear-gradient(rgba(36, 131, 123, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(36, 131, 123, 0.04) 1px, transparent 1px);
    }
    .page { max-width: 1320px; margin: 0 auto; padding: 28px 32px; }

    header {
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 24px; align-items: center;
      padding: 16px 22px; margin-bottom: 24px;
      border: 1px solid var(--ac-cyan);
      background: linear-gradient(180deg, rgba(58,169,159,0.08), transparent);
      position: relative;
    }
    header::before, header::after {
      content: ""; position: absolute; width: 16px; height: 16px;
      border: 2px solid var(--ac-magenta);
    }
    header::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
    header::after  { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

    .logo { font-size: 22px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
    .logo .syl  { color: var(--ac-cyan); text-shadow: 0 0 10px var(--ac-cyan); }
    .logo .lago { color: var(--ac-magenta); text-shadow: 0 0 10px var(--ac-magenta); }
    .logo .slash { color: var(--tx-3); margin: 0 8px; }
    .kpi { display: flex; gap: 28px; font-size: 11px; color: var(--tx-3); text-transform: uppercase; letter-spacing: 0.12em; }
    .kpi span b { display: block; color: var(--ac-cyan); font-size: 18px; font-weight: 600; margin-top: 2px; }
    .toggle {
      padding: 8px 16px; border: 1px solid var(--ac-cyan); color: var(--ac-cyan);
      font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
    }
    .toggle:hover { background: var(--ac-cyan); color: var(--bg); }

    nav.tabs { display: flex; gap: 2px; margin-bottom: 20px; }
    nav.tabs a {
      padding: 10px 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--tx-2); background: var(--bg-2); border: 1px solid var(--ui-3);
    }
    nav.tabs a.active {
      color: var(--ac-magenta); border-color: var(--ac-magenta);
      background: rgba(206, 93, 151, 0.06);
    }
    nav.tabs a:hover { text-decoration: none; color: var(--ac-cyan); border-color: var(--ac-cyan); }

    h1 {
      font-family: var(--font-display); font-size: 40px; font-weight: 600;
      margin: 0 0 4px; letter-spacing: -0.02em; text-transform: uppercase;
    }
    h1 .accent { color: var(--ac-magenta); }
    .sub { color: var(--tx-2); margin-bottom: 20px; font-size: 13px; }
    .sub .status { color: var(--ac-green); }
    .sub .count { color: var(--ac-cyan); }

    .search-bar {
      display: flex; align-items: center; gap: 12px;
      border: 1px solid var(--ac-cyan); padding: 10px 14px;
      background: rgba(58, 169, 159, 0.04);
      margin-bottom: 14px;
      box-shadow: inset 0 0 20px rgba(58, 169, 159, 0.06);
    }
    .search-bar:focus-within {
      border-color: var(--ac-magenta);
      box-shadow: inset 0 0 20px rgba(206, 93, 151, 0.1), 0 0 12px rgba(206, 93, 151, 0.25);
    }
    .search-bar .caret { color: var(--ac-magenta); font-weight: 700; }
    .search-bar input {
      flex: 1; background: transparent; border: 0; outline: 0;
      font: inherit; color: var(--tx); caret-color: var(--ac-magenta);
    }
    .search-bar input::placeholder { color: var(--tx-3); text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px; }
    .search-bar .hint {
      color: var(--tx-3); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.15em;
    }
    .search-bar .hint b { color: var(--ac-cyan); font-weight: 500; }

    .chip-row {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
      align-items: center;
    }
    .chip-row .label {
      color: var(--tx-3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em;
      padding-right: 4px;
    }
    .chip {
      padding: 4px 12px; border: 1px solid var(--ui-3);
      color: var(--tx-2); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.12em;
      background: var(--bg-2);
    }
    .chip:hover { border-color: var(--ac-cyan); color: var(--ac-cyan); }
    .chip.active {
      border-color: var(--ac-magenta); color: var(--ac-magenta);
      box-shadow: 0 0 8px rgba(206, 93, 151, 0.35);
      background: rgba(206, 93, 151, 0.06);
    }
    .chip .n { color: var(--tx-3); margin-left: 6px; font-weight: 400; }
    .chip.active .n { color: var(--ac-magenta); }

    .data-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 14px; margin-top: 20px;
    }
    .card {
      border: 1px solid var(--ui-3); padding: 18px 20px;
      background: var(--bg-2); position: relative;
      transition: border-color 0.15s;
    }
    .card::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
      background: var(--ac-cyan); opacity: 0.5;
    }
    .card.skills::before   { background: var(--ac-blue); }
    .card.agents::before   { background: var(--ac-purple); }
    .card.commands::before { background: var(--ac-green); }
    .card.hooks::before    { background: var(--ac-orange); }
    .card.mcp::before      { background: var(--ac-magenta); }
    .card.loadouts::before { background: var(--ac-red); }
    .card.rules::before    { background: var(--ac-cyan); }
    .card:hover { border-color: var(--ac-magenta); }
    .card:hover::before { opacity: 1; }

    .card .bracket {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--tx-3);
      text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px;
    }
    .card .bracket .type { color: var(--ac-magenta); }
    .card h3 {
      margin: 0 0 8px; font-size: 20px; font-weight: 500; letter-spacing: 0.02em;
      font-family: var(--font-display); text-transform: uppercase;
    }
    .card .desc { color: var(--tx-2); margin: 0 0 14px; font-size: 13px; line-height: 1.55; }
    .card .meta {
      display: flex; gap: 16px; font-size: 10px; color: var(--tx-3);
      text-transform: uppercase; letter-spacing: 0.12em;
    }
    .card .meta b { color: var(--ac-cyan); font-weight: 500; }

    .empty {
      border: 1px dashed var(--ac-magenta); padding: 60px 30px;
      text-align: center; color: var(--tx-3); margin-top: 20px;
      text-transform: uppercase; letter-spacing: 0.15em; font-size: 12px;
    }
    .empty b { color: var(--ac-magenta); font-weight: 500; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="logo"><span class="syl">SYL</span><span class="lago">LAGO</span></div>
      <div class="kpi">
        <span>Items <b id="kpiItems">8</b></span>
        <span>Providers <b>4</b></span>
        <span>Registries <b>1</b></span>
        <span>Port <b>19099</b></span>
      </div>
      <button class="toggle" id="themeBtn">◐ theme</button>
    </header>

    <nav class="tabs">
      <a class="active">&gt; catalog</a>
      <a>providers</a>
      <a>registries</a>
      <a>loadouts</a>
      <a>settings</a>
    </nav>

    <h1>Catalog<span class="accent">.sys</span></h1>
    <div class="sub">
      <span class="status">● ONLINE</span> · ws://127.0.0.1:19099 · uptime 00:12:47 ·
      <span class="count" id="subCount">8 records indexed</span>
    </div>

    <div class="search-bar">
      <span class="caret">&gt;</span>
      <input id="searchInput" type="text" placeholder="query catalog — name, type, provider…" autofocus />
      <span class="hint"><b>/</b> focus · <b>esc</b> clear</span>
    </div>

    <div class="chip-row" id="typeChips"></div>
    <div class="chip-row" id="originChips"></div>

    <section class="data-grid" id="grid"></section>
    <div id="empty" class="empty" style="display:none">
      &gt; NO MATCHES FOUND · refine <b id="emptyTerm">query</b>
    </div>
  </div>

  <script src="./shared/data.js"></script>
  <script src="./shared/render.js"></script>
  <script src="./shared/filter.js"></script>
  <script>
    const state = createFilterState();
    const typeCounts   = countBy(MOCK_CATALOG, "type");
    const originCounts = countBy(MOCK_CATALOG, "origin");

    function buildChipRow(container, key, label, values, counts) {
      clear(container);
      container.appendChild(el("span", { class: "label" }, label));
      container.appendChild(el("button", { class: "chip", "data-val": "all" },
        [el("span", {}, "all"), el("span", { class: "n" }, String(MOCK_CATALOG.length))]));
      values.forEach(v => {
        container.appendChild(el("button", { class: "chip", "data-val": v },
          [el("span", {}, v), el("span", { class: "n" }, String(counts[v]))]));
      });
      container.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => { state[key] = btn.dataset.val; render(); });
      });
    }

    buildChipRow(document.getElementById("typeChips"),   "type",   "type:",   Object.keys(typeCounts),   typeCounts);
    buildChipRow(document.getElementById("originChips"), "origin", "origin:", Object.keys(originCounts), originCounts);

    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const emptyTerm = document.getElementById("emptyTerm");
    const subCount = document.getElementById("subCount");
    const kpiItems = document.getElementById("kpiItems");

    function render() {
      const filtered = applyFilter(state, MOCK_CATALOG);
      clear(grid);
      filtered.forEach(i => {
        grid.appendChild(el("article", { class: "card " + i.type }, [
          el("div", { class: "bracket" }, [
            el("span", { class: "type" }, "[" + i.type + "]"),
            el("span", {}, i.updated),
          ]),
          el("h3", {}, i.name),
          el("p", { class: "desc" }, i.description),
          el("div", { class: "meta" }, [
            el("span", {}, ["prov ", el("b", {}, i.provider)]),
            el("span", {}, ["src ", el("b", {}, i.origin)]),
            el("span", {}, [el("b", {}, String(i.files)), " files · ", i.size]),
          ]),
        ]));
      });
      subCount.textContent = filtered.length + " / " + MOCK_CATALOG.length + " records indexed";
      kpiItems.textContent = String(filtered.length);
      empty.style.display = filtered.length === 0 ? "block" : "none";
      emptyTerm.textContent = state.query ? '"' + state.query + '"' : "filters";
      document.querySelectorAll(".chip-row button").forEach(btn => {
        const key = btn.parentElement.id === "typeChips" ? "type" : "origin";
        btn.classList.toggle("active", btn.dataset.val === state[key]);
      });
    }

    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener("input", e => { state.query = e.target.value; render(); });
    searchInput.addEventListener("keydown", e => {
      if (e.key === "Escape") { searchInput.value = ""; state.query = ""; render(); }
    });
    document.addEventListener("keydown", e => {
      if (e.key === "/" && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
    });

    render();
    initThemeToggle("themeBtn");
  </script>
</body>
</html>
