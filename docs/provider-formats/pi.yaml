    provider_extensions:
      - id: pi_rules_via_skill_md
        name: "Rules delivered via SKILL.md"
        description: "Pi has no dedicated rules format. Standing instructions are delivered by placing a SKILL.md file in a skill directory and relying on the skills discovery mechanism. Pi reads skills.md as 'instructions' — the same progressive-disclosure system that loads capability skills also loads any SKILL.md that contains standing instructions. Rules can be scoped globally (~/.pi/agent/skills/) or per-project (.pi/skills/) using the same paths as skills."
        source_ref: "https://raw.githubusercontent.com/badlogic/pi-mono/main/packages/coding-agent/docs/skills.md"
        graduation_candidate: false
      - id: pi_rules_cross_harness
        name: "Cross-harness rules loading via settings array"
        description: "Because pi's settings skills array accepts paths to other providers' skill directories, rules authored as SKILL.md files for other providers can be loaded directly into a pi session without conversion. This is a side-effect of cross-harness skill loading rather than a dedicated rules feature."
        source_ref: "https://raw.githubusercontent.com/badlogic/pi-mono/main/packages/coding-agent/docs/skills.md"
        graduation_candidate: false
    loading_model: "Rules in pi are a subset of skills: any SKILL.md that carries standing instructions rather than a specific capability is functionally a rule. Discovery, progressive disclosure, and loading mechanics are identical to skills. There is no separate rules scanner, path, or frontmatter schema — the distinction is purely by convention in the file's content."
    notes: "Pi does not distinguish rules from skills at the format or tooling level. The 'rules' content type maps to pi's SKILL.md format and shares all discovery locations with skills. Unlike providers that have a dedicated memory/rules file (e.g., CLAUDE.md, .windsurfrules), pi uses the same skill machinery for standing instructions. This means rules inherit all skills features: progressive disclosure, disable-model-invocation, cross-harness loading, CLI flags, etc."

