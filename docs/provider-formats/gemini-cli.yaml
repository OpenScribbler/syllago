        confidence: inferred
    provider_extensions:
      - id: transport_types
        name: Three transport mechanisms
        description: >
          Gemini CLI supports three MCP transport types: stdio (spawns a subprocess,
          communicates via stdin/stdout, configured via command + optional args/cwd),
          SSE (Server-Sent Events, configured via url), and Streamable HTTP (configured
          via httpUrl). The transport type can be set explicitly via the type field
          (stdio/sse/http) or inferred from which connection property is present.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/tools/mcp-server.md"
        graduation_candidate: true
      - id: tool_filtering
        name: Per-server tool allowlist and blocklist
        description: >
          Each MCP server config supports includeTools (string[]) to allowlist specific
          tools from that server, and excludeTools (string[]) to blocklist tools.
          excludeTools takes precedence over includeTools — if a tool appears in both,
          it is excluded. When includeTools is omitted, all tools from the server are
          available.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/schemas/settings.schema.json"
        graduation_candidate: true
      - id: server_trust
        name: Per-server trust flag
        description: >
          The trust boolean on an MCP server configuration bypasses all tool call
          confirmations for that server when set to true (default: false). Trusted
          servers execute tools without prompting the user for approval.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/tools/mcp-server.md"
        graduation_candidate: false
      - id: global_mcp_settings
        name: Global MCP allowed/excluded lists
        description: >
          The top-level mcp object in settings.json provides global rules across all
          servers: mcp.allowed (string[]) allowlists server names so only listed servers
          connect; mcp.excluded (string[]) blocklists server names to prevent connection.
          These are global filters applied before per-server configuration.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/tools/mcp-server.md"
        graduation_candidate: false
      - id: env_variable_expansion
        name: Environment variable expansion in env blocks
        description: >
          Gemini CLI automatically expands environment variables in the env block of
          MCP server configs. Supports POSIX/Bash syntax ($VAR or ${VAR}) on all
          platforms and Windows syntax (%VAR%) on Windows. This allows referencing
          secrets from the shell environment without hardcoding them in settings.json.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/tools/mcp-server.md"
        graduation_candidate: true
      - id: server_management_commands
        name: CLI commands for MCP server management
        description: >
          MCP servers can be managed via gemini mcp subcommands: mcp add (add a server),
          mcp remove (delete from config), mcp list (view status of all servers), mcp
          enable/disable (toggle without removing, with optional --session flag for
          session-only changes). Enable/disable state is persisted to
          ~/.gemini/mcp-server-enablement.json. In-session equivalents: /mcp list,
          /mcp enable <name>, /mcp disable <name>, /mcp reload.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/tools/mcp-server.md"
        graduation_candidate: false
      - id: resource_referencing
        name: MCP resource referencing via @ syntax
        description: >
          Gemini CLI discovers MCP server resources (via resources/list) at connection
          time and exposes them alongside filesystem paths in the @ completion menu.
          Resources are referenced with @server://resource/path syntax in conversation.
          The CLI calls resources/read and injects the content into the conversation
          when referenced.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/tools/mcp-server.md"
        graduation_candidate: false
    loading_model: "MCP servers are configured in settings.json under the mcpServers key as a map of server-name to MCPServerConfig objects. On startup, Gemini CLI iterates all configured servers, establishes transport connections, fetches tool definitions, sanitizes schemas, and registers tools in the global tool registry. MCP tools are named with the pattern mcp_<server_name>_<tool_name>. Settings are loaded from project (.gemini/settings.json), user (~/.gemini/settings.json), and system (/etc/gemini-cli/settings.json) layers."
    notes: "Stdio MCP servers are only connected (and shown as Connected in mcp list) when the current directory is trusted. Untrusted directories show stdio servers as Disconnected. Connection errors are silent by default on startup — a hint is shown if issues are detected, and full diagnostics appear when /mcp list is run interactively or when a tool from that server is invoked."

  commands:
    status: supported
    sources:
      - uri: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/custom-commands.md"
        type: documentation
        fetch_method: gh_raw
        content_hash: "sha256:7c721469ae498676be363efdd60e84a539fb5cf2c36d0bffd655efbdb9d53e32"
        fetched_at: "2026-04-11T21:50:35Z"
    canonical_mappings:
      argument_substitution:
        supported: true
        mechanism: "{{args}} placeholder injects all user-provided arguments; processed before shell injection (!{...}) and other substitutions; default argument handling collapses newlines"
        confidence: confirmed
      builtin_commands:
        supported: true
        mechanism: "built-in slash commands include /commands reload (reload command files without restart) and /help; user-defined commands supplement but do not replace built-ins"
        confidence: confirmed
    provider_extensions:
      - id: toml_format
        name: TOML command file format
        description: >
          Commands are defined as TOML files with a .toml extension. The required field
          is prompt (string, single or multi-line). The optional field is description
          (string, one-line); if omitted, a generic description is generated from the
          filename. No other fields are documented in the v1 format.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/custom-commands.md"
        graduation_candidate: false
      - id: namespace_via_subdirectory
        name: Namespace via subdirectory path
        description: >
          Commands are namespaced by their file path relative to the commands/ directory.
          Path separators (/ or \) are converted to colons in the command name. For
          example, commands/git/commit.toml becomes /git:commit. This allows hierarchical
          organization of commands without any explicit namespace syntax in the TOML file.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/custom-commands.md"
        graduation_candidate: true
      - id: args_placeholder
        name: "{{args}} argument injection placeholder"
        description: >
          The {{args}} placeholder in the prompt is replaced with text the user typed
          after the command name. When used in the main prompt body, args are injected
          raw. When used inside a shell injection block (!{...}), args are automatically
          shell-escaped before substitution to prevent command injection. If the prompt
          does not contain {{args}}, the user's full command input is appended after two
          newlines (default argument handling).
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/custom-commands.md"
        graduation_candidate: true
      - id: shell_injection
        name: Shell command injection with !{...}
        description: >
          The !{...} syntax in a prompt executes a shell command and injects its stdout
          into the prompt before sending to the model. The parser handles nested braces
          and balanced-brace content. Before execution, Gemini CLI displays the resolved
          command and asks the user to confirm. If the command fails, the injected text
          includes stderr and an exit code status line. {{args}} inside !{...} is
          automatically shell-escaped.
        source_ref: "https://raw.githubusercontent.com/google-gemini/gemini-cli/main/docs/cli/custom-commands.md"
        graduation_candidate: false
      - id: file_content_injection
        name: File content injection with @{...}
        description: >
          The @{...} syntax in a prompt injects file content or a directory listing
          directly into the prompt. Supports text files, images (PNG, JPEG), PDFs,
          audio, and video (as multimodal input). Directory paths inject a listing of
          all files recursively, respecting .gitignore and .geminiignore. File injection
          is processed before shell commands (!{...}) and argument substitution ({{args}}).
          Paths are workspace-aware; absolute paths within the workspace are allowed.
