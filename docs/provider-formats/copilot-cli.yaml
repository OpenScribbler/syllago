    provider_extensions:
      - id: hook_event_types
        name: Six Hook Event Types
        summary: Six named events (sessionStart, sessionEnd, userPromptSubmitted, preToolUse, postToolUse, errorOccurred) receive JSON payloads via stdin.
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/reference/hooks-configuration.md"
        graduation_candidate: true
        conversion: translated

      - id: hook_config_format
        name: JSON Hook Configuration File
        summary: "Hooks live in .github/hooks/*.json with a {version, hooks:{EVENT_NAME:[...]}} schema; each hook has type, bash, powershell, cwd, timeoutSec, comment."
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/reference/hooks-configuration.md"
        graduation_candidate: false
        conversion: translated

      - id: pre_tool_use_deny
        name: Pre-Tool-Use Deny Gate
        summary: 'Only preToolUse can block tool execution by returning {permissionDecision:"deny", permissionDecisionReason:"..."}; other hook outputs are ignored.'
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/reference/hooks-configuration.md"
        graduation_candidate: true
        conversion: translated
        provider_field: permissionDecision
    loading_model: >
      Hooks are loaded from `.github/hooks/*.json` in the repository at session start.
      Plugins can also contribute hooks via a `hooks.json` file in the plugin root or
      `hooks/` subdirectory. Hook scripts receive JSON on stdin and write JSON to stdout;
      only `preToolUse` output is acted upon. Scripts must exit 0 for success. Default
      timeout is 30 seconds per hook; this is overridable per hook via `timeoutSec`.
      Multiple hooks for the same event execute in declaration order.
    notes: >
      Copilot CLI hooks are structurally similar to Claude Code hooks but use different
      event names and JSON schema. The canonical syllago event names (before_tool_execute,
      after_tool_execute, etc.) do not have a direct 1:1 mapping to Copilot's camelCase
      event names (preToolUse, postToolUse, sessionStart, sessionEnd,
      userPromptSubmitted, errorOccurred). Only preToolUse supports permission gating;
      all other hook outputs are ignored. PowerShell is a first-class script target
      alongside Bash, making hooks functional on Windows without WSL.

