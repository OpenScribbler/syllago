        summary: Delegated agents run as subagents with isolated context windows; Git-SHA-based versioning pins the active profile for a task's lifetime.
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/how-tos/copilot-cli/customize-copilot/create-custom-agents-for-cli.md"
