        summary: Plugins install from marketplaces (default copilot-plugins, awesome-copilot) defined by a marketplace.json file; custom marketplaces support private distribution.
        source_ref: "https://raw.githubusercontent.com/github/docs/main/content/copilot/concepts/agents/copilot-cli/about-cli-plugins.md"
        graduation_candidate: false
