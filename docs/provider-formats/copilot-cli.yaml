      Copilot CLI custom agents use a YAML-frontmatter Markdown format (.agent.md)
      shared with other Copilot surfaces (VS Code, github.com), though some properties
      are surface-specific (mcp-servers and metadata are cloud-agent-only; argument-hint
      and handoffs are VS Code-only and ignored by cloud agent). The tool alias system
      enables cross-provider agent profile portability — the same tools list works across
      Claude Code, VS Code, and Copilot CLI without modification. The stdio→local type
      mapping in MCP server configs within agent profiles similarly enables sharing with
      Claude Code.

