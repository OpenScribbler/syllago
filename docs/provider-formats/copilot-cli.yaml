    loading_model: >
      Plugins are installed to `~/.copilot/installed-plugins/MARKETPLACE/PLUGIN-NAME`
      (marketplace installs) or `~/.copilot/installed-plugins/_direct/SOURCE-ID/`
      (direct installs). Plugin components are cached; reinstalling is required to pick
      up changes to a locally-developed plugin. Component precedence: agents and skills
      use first-found-wins (project/personal configs beat plugins); MCP servers use
      last-wins (plugins override personal, `--additional-mcp-config` flag overrides
      plugins). Built-in tools and agents cannot be overridden. The `commands/` path
      referenced in plugin.json schema does not have documented file format semantics
      in the source material.
    notes: >
      Copilot CLI's "commands" content type maps loosely to its plugin system rather than
      a standalone slash-command mechanism. The plugin.json schema includes a `commands`
      path field, and the loading order diagram shows skills override commands (commands
      sit below skills in precedence), but no documentation exists for what command files
      look like or how they are invoked. This suggests the commands mechanism is either
      nascent, undocumented, or subsumed by the skills system. Syllago should treat plugin
      install/management as the primary unit of commands-equivalent distribution for
      Copilot CLI until further documentation emerges.
