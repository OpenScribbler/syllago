        fetch_method: html_url
        content_hash: "sha256:0995e07daf155010f3c75a71607b43c8392da192a57803b89d710bcefabc38a4"
        fetched_at: "2026-04-11T21:50:31Z"
    canonical_mappings:
      display_name:
        supported: true
        mechanism: "yaml frontmatter key: name (optional, defaults to directory name)"
        confidence: confirmed
      description:
        supported: true
        mechanism: "yaml frontmatter key: description (recommended, not required)"
        confidence: confirmed
      user_invocable:
        supported: true
        mechanism: "yaml frontmatter key: user-invocable (optional bool, default: true)"
        confidence: confirmed
      disable_model_invocation:
        supported: true
        mechanism: "yaml frontmatter key: disable-model-invocation (optional bool, default: false)"
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: "<repo>/.factory/skills/<skill-name>/SKILL.md"
        paths:
          - ".factory/skills/<skill-name>/SKILL.md"
          - ".agent/skills/<skill-name>/SKILL.md"
        confidence: confirmed
      global_scope:
        supported: true
        mechanism: "~/.factory/skills/<skill-name>/SKILL.md"
        paths:
          - "~/.factory/skills/<skill-name>/SKILL.md"
        confidence: confirmed
      shared_scope:
        supported: false
        confidence: unknown
      canonical_filename:
        supported: true
        mechanism: "SKILL.md (fixed, required filename within the skill directory)"
        confidence: confirmed
      custom_filename:
        supported: true
        mechanism: "skill.mdx is accepted as an alternative to SKILL.md within the skill directory"
        confidence: confirmed
    provider_extensions:
      - id: supporting_files
        name: Supporting Files
        description: >
          Optional supporting files (scripts, schemas, checklists, etc.) can be co-located
          in the skill directory alongside SKILL.md. The Droid can reference these files
          when executing the skill. This enables self-contained skill packages that bundle
          their own tooling assets.
        source_ref: "https://docs.factory.ai/cli/configuration/skills"
        graduation_candidate: true
      - id: auto_invocation
        name: Auto-Invocation
        description: >
          The Droid automatically invokes matching skills when they apply to the current
          task, without explicit user prompting. The skill description is the primary
          trigger signal — the model uses it to determine whether a skill is relevant to
          the current context. The user-invocable and disable-model-invocation frontmatter
          keys control whether auto-invocation is permitted.
        source_ref: "https://docs.factory.ai/cli/configuration/skills"
        graduation_candidate: true
      - id: monorepo_skill_paths
        name: Monorepo Skill Paths
        description: >
          Skills can be organized per-project within a monorepo using per-project
          .factory/skills/ directories, or shared across projects via a root-level
          .factory/skills/ directory. This allows monorepos to maintain project-specific
          skills alongside shared skills without path conflicts.
        source_ref: "https://docs.factory.ai/cli/configuration/skills"
        graduation_candidate: false
      - id: skill_composability
        name: Skill Composability
        description: >
          The Droid can chain multiple skills inside a single plan, invoking them in
          sequence as the plan progresses. This enables composite workflows composed
          of reusable skill primitives without requiring a single monolithic skill.
        source_ref: "https://docs.factory.ai/cli/configuration/skills"
        graduation_candidate: false
      - id: legacy_commands_compatibility
        name: Legacy Commands Compatibility
        description: >
          Files under .factory/commands/ continue to work and are recognized by the
          Droid. Skills (under .factory/skills/) supersede commands as the preferred
          mechanism, but the commands directory is still loaded for backwards
          compatibility with pre-skills configurations.
        source_ref: "https://docs.factory.ai/cli/configuration/skills"
        graduation_candidate: false
    loading_model: ""
    notes: "A compatibility discovery path at <repo>/.agent/skills/ is also supported (not in original format doc). The docs additionally show skill.mdx accepted alongside SKILL.md. Skill descriptions serve double duty as both user-facing documentation and auto-invocation trigger signals — the model reads the description to decide whether the skill applies to the current task."

  rules:
    status: supported
    sources:
      - uri: "https://docs.factory.ai/cli/configuration"
        type: documentation
        fetch_method: http
        content_hash: "sha256:ece84e852c185734366ebbb7a1a2936fb6f14bfbadf44cf6749869267f6bcf53"
        fetched_at: "2026-04-11T21:50:26.856210369Z"
    canonical_mappings: {}
    provider_extensions:
      - id: agents_md_format
        name: AGENTS.md Format
        description: >
          Factory uses AGENTS.md as its primary rules file format, explicitly mirroring
          the cross-provider AGENTS.md standard originated by OpenAI/Codex. Multiple
          AGENTS.md files can exist at different directory levels; the innermost file
          takes precedence over outer ones.
        source_ref: "https://docs.factory.ai/cli/configuration"
        graduation_candidate: true
      - id: global_rules_path
        name: Global Rules Path
        description: >
          A global AGENTS.md at ~/AGENTS.md applies across all projects. This
          sits above the repo root in the discovery hierarchy and is overridden
          by any project-level or subdirectory AGENTS.md.
        source_ref: "https://docs.factory.ai/cli/configuration"
        graduation_candidate: false
      - id: custom_instructions_setting
        name: Custom Instructions Setting
        description: >
          The personal settings file ~/.factory/settings.json supports a
          customInstructions key for always-on guidance that applies regardless
          of which project is open. Complements rather than replaces AGENTS.md.
        source_ref: "https://docs.factory.ai/cli/configuration"
        graduation_candidate: false
    loading_model: ""
    notes: "Factory mirrors the AGENTS.md cross-provider standard (OpenAI/Codex origin). Discovery hierarchy: ~/AGENTS.md (global) → repo root AGENTS.md → subdir AGENTS.md (innermost wins). Common sections: project overview, build/test commands, coding conventions, PR workflow."

  hooks:
    status: supported
    sources:
      - uri: "https://docs.factory.ai/cli/configuration/hooks-guide"
        type: documentation
        fetch_method: http
        content_hash: "sha256:7c23535321a844fb9348234d31dbaec5f11d3e9895c996825248c52637ff0c81"
        fetched_at: "2026-04-11T21:46:21.993498315Z"
      - uri: "https://docs.factory.ai/reference/hooks-reference"
        type: documentation
        fetch_method: http
        content_hash: "sha256:32313a7e5191527eb7b581717c3eb2731674bfdaacad31ba011892a7955454a1"
        fetched_at: "2026-04-11T21:46:22.150307964Z"
    canonical_mappings: {}
    provider_extensions:
      - id: hook_events
        name: Hook Events
        description: >
          Eight hook events: PreToolUse, PostToolUse, Notification, UserPromptSubmit,
          Stop, SubagentStop, PreCompact, SessionStart, SessionEnd. PreToolUse can
          block tool execution (decision: block). PostToolUse can trigger rerun
          (decision: rerun). UserPromptSubmit can modify inputText before processing.
        source_ref: "https://docs.factory.ai/reference/hooks-reference"
        graduation_candidate: true
      - id: hook_config_structure
        name: Hook Config Structure
        description: >
          Hooks are configured as JSON under a top-level "hooks" key:
          {"hooks": {"EventName": [{"matcher": "ToolPattern", "hooks": [{"type":
          "command", "command": "..."}]}]}}. Matchers support exact strings, regex
          patterns, and "*" for all tools. MCP tool names follow the
          mcp__serverName__toolName pattern.
        source_ref: "https://docs.factory.ai/cli/configuration/hooks-guide"
        graduation_candidate: false
      - id: hook_scope_files
        name: Hook Scope Files
        description: >
          Hooks are stored in scoped settings files: ~/.factory/settings.json
          (user-global), .factory/settings.json (project, committed),
          .factory/settings.local.json (project-local, not committed). Plugin hooks
          live in plugins/[name]/settings.json.
        source_ref: "https://docs.factory.ai/cli/configuration/hooks-guide"
        graduation_candidate: false
      - id: hook_exit_code_behavior
        name: Hook Exit Code Behavior
        description: >
          Exit code 2 has special semantics: suppress output and return empty result.
          JSON output fields include decision, reason, stopReason, inputText, and
          suppressOutput. The FACTORY_TOOL_INPUT environment variable is available
          to hook processes.
        source_ref: "https://docs.factory.ai/reference/hooks-reference"
        graduation_candidate: true
      - id: pre_compact_event
        name: PreCompact Hook Event
        description: >
          The PreCompact event fires before context compaction occurs, enabling
          hooks to inject memory or state into the compaction prompt. Useful for
          preserving important session context across compaction boundaries.
        source_ref: "https://docs.factory.ai/reference/hooks-reference"
        graduation_candidate: true
    loading_model: ""
    notes: "Hook structure closely mirrors Claude Code's hook system (same event names, same JSON config shape, same exit-code semantics). The FACTORY_TOOL_INPUT env var and suppressOutput flag appear to be Factory-specific additions. Plugin hooks via plugins/[name]/settings.json enable installable hook bundles."

