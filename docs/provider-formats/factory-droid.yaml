  agents:
    status: supported
    sources:
      - uri: "https://docs.factory.ai/cli/configuration/custom-droids"
        type: documentation
        fetch_method: http
        content_hash: "sha256:2e109957800e1d85e89f2adcfee98c130b23017b516c8378437a48e50ab4bb08"
        fetched_at: "2026-04-11T21:50:33.339259873Z"
    canonical_mappings: {}
    provider_extensions:
      - id: droid_format
        name: Custom Droid Format
        description: >
          Agents (Custom Droids) are .md files stored under .factory/droids/
          (project) or ~/.factory/droids/ (personal). Each droid defines its own
          system prompt, model preference, and tooling policy in a single file.
          The CLI scans top-level files only (no subdirectory recursion).
        source_ref: "https://docs.factory.ai/cli/configuration/custom-droids"
        graduation_candidate: true
      - id: droid_precedence
        name: Project-Over-Personal Precedence
        description: >
          Project-scope droids override personal droids with the same slug.
          This is the opposite of skills precedence (where personal overrides
          project) and must be accounted for in any cross-provider conversion.
        source_ref: "https://docs.factory.ai/cli/configuration/custom-droids"
        graduation_candidate: false
      - id: tool_categories
        name: Tool Categories
        description: >
          Droids specify allowed tools via named categories: filesystem, shell,
          search, browser, web_fetch, and others. This categorical tooling policy
          differs from per-tool allowlists used by some other providers.
        source_ref: "https://docs.factory.ai/cli/configuration/custom-droids"
        graduation_candidate: true
      - id: model_selection_per_droid
        name: Per-Droid Model Selection
        description: >
          Each droid can specify its own model preference independently of the
          global model setting, enabling mixed-model agent compositions within
          a single project.
        source_ref: "https://docs.factory.ai/cli/configuration/custom-droids"
        graduation_candidate: true
      - id: claude_code_subagent_import
        name: Claude Code Subagent Import
        description: >
          The /import-subagent command reads .claude/agents/*.md files and
          converts them to Factory droid format, providing a migration path
          from Claude Code agent definitions to Factory droids.
        source_ref: "https://docs.factory.ai/cli/configuration/custom-droids"
        graduation_candidate: false
    loading_model: ""
    notes: "Factory calls agents 'Custom Droids'. Exposed as subagent_type targets for the Task tool. Project droids override personal (note: reverse of skills). Droids are enabled by default with live progress reporting in the UI."

  commands:
    status: supported
    sources:
      - uri: "https://docs.factory.ai/cli/configuration/custom-slash-commands"
        type: documentation
        fetch_method: http
        content_hash: "sha256:fefc0ec7c7fceff7308a330ad6bdb1aa6e19adb113a802871bf2e110a0177260"
        fetched_at: "2026-04-11T21:50:24.284728649Z"
    canonical_mappings: {}
    provider_extensions:
      - id: two_command_types
        name: Two Command Types
        description: >
          Commands come in two types: Markdown (.md files — prompt templates
          injected into the conversation, support $ARGUMENTS substitution) and
          Executable (scripts — run as shell commands with stdout fed into the
          conversation). Both share the same discovery directories.
        source_ref: "https://docs.factory.ai/cli/configuration/custom-slash-commands"
        graduation_candidate: true
      - id: command_discovery_paths
        name: Command Discovery Paths
        description: >
          Commands are discovered from .factory/commands/ (project) or
          ~/.factory/commands/ (personal). The filename (without extension)
          becomes the slash command name. Project commands override personal
          commands with the same slug.
        source_ref: "https://docs.factory.ai/cli/configuration/custom-slash-commands"
        graduation_candidate: false
      - id: skills_supersede_commands
        name: Skills Supersede Commands
        description: >
          Factory's own docs note that skills are now user-invokable via slash
          commands and recommend skills over commands for new work. Commands
          remain supported for backwards compatibility but are considered
          a legacy mechanism relative to skills.
        source_ref: "https://docs.factory.ai/cli/configuration/custom-slash-commands"
        graduation_candidate: false
    loading_model: ""
    notes: "Commands are partly superseded by skills in Factory's model — the docs explicitly suggest using skills for new commands. The $ARGUMENTS substitution in Markdown commands is equivalent to the $ARGUMENTS pattern found in other providers (e.g. Claude Code). Executable commands differ from skills by running as shell processes rather than being injected as prompts."
