      permission_control:
        supported: true
        mechanism: "hook_permission_decision: Codex hooks can return permission decisions that grant or deny tool availability"
        confidence: confirmed
    provider_extensions:
      - id: hook_events
        name: Hook Events
        description: >
          Codex supports five hook events: PreToolUse, PostToolUse, SessionStart,
          UserPromptSubmit, and Stop. Event names use PascalCase in the config.toml hooks file
          (under [hooks.PreToolUse], etc.) and camelCase in the TypeScript app-server protocol
          (preToolUse, postToolUse, sessionStart, userPromptSubmit, stop). In the Rust wire
          payload, event names serialize as PascalCase strings (HookEventNameWire enum).
        source_ref: "config.rs (HookEvents struct), HookEventName.ts"
        graduation_candidate: false
      - id: hook_handler_types
        name: Hook Handler Types
        description: >
          Each hook entry specifies a handler type via the type field. Three types are supported:
          command (runs a shell command), prompt (invokes a prompt), and agent (delegates to a
          sub-agent). The command type is the primary type for external scripts. Command handlers
          support: command (required string), timeout/timeoutSec (optional duration in seconds),
          async (bool, default false — runs hook asynchronously without blocking the operation),
          and statusMessage (optional display string).
        source_ref: "config.rs (HookHandlerConfig enum), HookHandlerType.ts"
        graduation_candidate: false
      - id: hook_matcher
        name: Tool Matcher (PreToolUse / PostToolUse)
        description: >
          PreToolUse and PostToolUse hook entries can include an optional matcher field (a string
          pattern) that filters which tool calls trigger the hook. When absent, the hook fires for
          all tool calls. This allows attaching hooks to specific tools by name.
        source_ref: "config.rs (MatcherGroup.matcher)"
        graduation_candidate: false
      - id: hook_execution_mode
        name: Hook Execution Mode (sync / async)
        description: >
          Hook handlers can run synchronously (blocking the current operation until the hook
          completes) or asynchronously (fire-and-forget, does not block). Exposed in the TypeScript
          protocol as HookExecutionMode with values sync and async. In the Rust config, the async
          field on HookHandlerConfig::Command controls this for command handlers.
        source_ref: "HookExecutionMode.ts, config.rs (HookHandlerConfig::Command.async)"
        graduation_candidate: false
      - id: hook_scope
        name: Hook Scope (thread / turn)
        description: >
          Hooks can be scoped to a thread (lifetime of the entire session) or a turn (single
          request/response cycle). Exposed in the TypeScript app-server protocol as HookScope
          with values thread and turn.
        source_ref: "HookScope.ts"
        graduation_candidate: false
      - id: hook_result_abort
        name: Hook Result Abort vs Continue
        description: >
          The Rust hook engine distinguishes three outcomes: Success, FailedContinue (hook failed
          but subsequent hooks and the operation continue), and FailedAbort (hook failed and the
          operation is aborted, no further hooks run). This tri-state is more expressive than a
          simple pass/fail. For command hooks, the JSON output schema supports a continue boolean
          (default true) and a decision field (approve/block for PreToolUse, block for PostToolUse)
          to control operation flow.
        source_ref: "types.rs (HookResult enum), pre-tool-use.command.output.schema.json"
        graduation_candidate: false
      - id: hook_suppress_output
        name: Suppress Output Flag
        description: >
          Hook command output schemas include a suppressOutput boolean (default false). When true,
          the hook's stdout/stderr is not surfaced to the user. Available on all five event output
          schemas.
        source_ref: "pre-tool-use.command.output.schema.json (suppressOutput)"
        graduation_candidate: false
      - id: hook_system_message
        name: System Message Injection
        description: >
          Hook command output schemas include a systemMessage field. When set, the hook can inject
          additional context into the system message for the current turn. Available on all five
          event output schemas.
        source_ref: "pre-tool-use.command.output.schema.json (systemMessage)"
        graduation_candidate: false
      - id: hook_turn_id
        name: Turn ID in Hook Payload
        description: >
          The hook input schemas (pre-tool-use, post-tool-use) include a turn_id field marked as a
          Codex extension. This exposes the active turn ID to internal turn-scoped hooks, allowing
          hooks to correlate their actions with specific model turns.
        source_ref: "pre-tool-use.command.input.schema.json (turn_id description)"
        graduation_candidate: false
      - id: hook_updated_input
        name: Updated Tool Input (PreToolUse)
        description: >
          The PreToolUse hook output schema includes an updatedInput field. When set by the hook,
          the tool's input is replaced with the hook-provided value before the tool executes. This
          allows hooks to modify or sanitize tool arguments before execution.
        source_ref: "pre-tool-use.command.output.schema.json (hookSpecificOutput.updatedInput)"
        graduation_candidate: false
      - id: hook_permission_decision
        name: Permission Decision (PreToolUse)
        description: >
          The PreToolUse hook output schema includes a permissionDecision field (allow, deny, ask)
          within hookSpecificOutput. This gives hooks the ability to make fine-grained permission
          decisions about tool execution, separate from the top-level approve/block decision.
        source_ref: "pre-tool-use.command.output.schema.json (PreToolUsePermissionDecisionWire)"
        graduation_candidate: false
    loading_model: >
      Hooks are configured in the codex config.toml file under a top-level [hooks] section.
      Each event type (PreToolUse, PostToolUse, SessionStart, UserPromptSubmit, Stop) maps to
      a list of MatcherGroup entries. Each MatcherGroup has an optional matcher string (for
      tool-name filtering on pre/post events) and a list of HookHandlerConfig entries. Each
      handler has a type (command, prompt, or agent) and type-specific fields. Command handlers
      specify a shell command string, an optional timeout in seconds, an async flag, and an
      optional status message. At runtime, the hooks engine serializes a JSON payload conforming
      to the per-event JSON schema and pipes it to the handler command's stdin. The command writes
      a JSON response to stdout conforming to the output schema, which the engine reads to
      determine continue/abort/decision behavior and optional system message injection.
    notes: >
      Codex's hook system is a full-featured lifecycle hook engine implemented in Rust
      (codex-rs/hooks). It has rich JSON schemas for all five events, supports three handler
      types (command, prompt, agent), and has a tri-state abort model (Success, FailedContinue,
      FailedAbort). The hooks are configured directly in config.toml, not in a separate file.
      The turn_id extension in the payload schemas is explicitly labeled a Codex extension.
      The permission decision and updated input features on PreToolUse give hooks meaningful
      control over tool execution. All hooks source material is from the codex-rs Rust codebase
      (no separate docs page exists beyond the JSON schemas).

