        description: >
          Codex supports a multi-agent system where spawned sub-agents run with a named role.
          Roles are declared in config.toml under the agents key (AgentsToml). Each role entry
          (AgentRoleToml) specifies: description (human-facing role documentation used in spawn
          tool guidance), config_file (optional path to a role-specific config layer TOML), and
          nickname_candidates (candidate names for agents spawned with this role). The agents
          section also supports global limits: max_threads (concurrent agent threads cap),
          max_depth (maximum nesting depth for spawned threads, minimum 1), and
          job_max_runtime_seconds (default max runtime for agent job workers).
        source_ref: "config.schema.json (AgentsToml, AgentRoleToml), role.rs"
        graduation_candidate: false
      - id: builtin_agent_roles
        name: Built-in Agent Roles (default, explorer, worker)
        description: >
          Codex ships three built-in agent roles that are always available without user
          configuration. default: the standard agent with no special config. explorer: a fast,
          read-focused agent for codebase questions, runs with model_reasoning_effort=low and
          uses explorer.toml config; description encourages parallel spawning for independent
          questions. worker: an execution agent for implementing features, fixing bugs, and
          splitting large refactors; description emphasizes ownership assignment and awareness
          of parallel workers. A fourth role, awaiter (for monitoring long-running commands),
          exists as a built-in config (awaiter.toml) but is currently commented out of the
          active built-in registry.
        source_ref: "role.rs (built_in::configs(), DEFAULT_ROLE_NAME, explorer, worker, awaiter)"
        graduation_candidate: false
      - id: role_config_layer
        name: Role Config Layer
        description: >
          When a role specifies a config_file, that file is loaded as a high-precedence config
          layer on top of the active session config. This allows roles to override model, reasoning
          effort, developer instructions, and other settings without modifying the user's base
          config. The role layer is inserted at session-flag precedence. The caller's current
          profile and model_provider are preserved unless the role explicitly selects them. Built-in
          role configs are embedded as static strings in the binary; user-defined role configs are
          read from disk paths relative to the config.toml that defines them.
        source_ref: "role.rs (apply_role_to_config, apply_role_to_config_inner, preservation_policy)"
        graduation_candidate: false
