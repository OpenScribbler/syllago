    canonical_mappings:
      activation_mode:
        supported: false
        mechanism: "Codex AGENTS.md files load unconditionally; no conditional or model-decision activation documented"
        confidence: inferred
      file_imports:
        supported: false
        mechanism: "No file import syntax documented for Codex AGENTS.md files"
        confidence: inferred
      cross_provider_recognition:
        supported: true
        mechanism: "agents_md_filename: Codex reads AGENTS.md files using the standard filename used by multiple providers"
        confidence: confirmed
      auto_memory:
        supported: false
        mechanism: "Codex does not have an AI-generated auto-memory system"
        confidence: confirmed
      hierarchical_loading:
        supported: true
        mechanism: "hierarchical_agents_md: Codex loads AGENTS.md from subdirectories with defined precedence (deeper overrides higher)"
        confidence: confirmed
    provider_extensions:
      - id: agents_md_filename
        name: AGENTS.md Filename
        summary: "Native rules filename is AGENTS.md, with configurable fallback list via config.toml project_doc_fallback_filenames."
        source_ref: "config.schema.json (project_doc_fallback_filenames, project_doc_max_bytes)"
        graduation_candidate: false
        provider_field: "project_doc_fallback_filenames"
        conversion: translated
      - id: hierarchical_agents_md
        name: Hierarchical AGENTS.md (child_agents_md feature flag)
        summary: "When features.child_agents_md is enabled, Codex emits scope/precedence guidance and combines AGENTS.md files across a directory hierarchy."
        source_ref: "docs/agents_md.md (Hierarchical agents message section)"
        graduation_candidate: true
        provider_field: "features.child_agents_md"
        conversion: not-portable
      - id: project_doc_max_bytes
        name: Project Doc Max Bytes
        summary: "Configurable byte cap on AGENTS.md reads via config.toml project_doc_max_bytes; prevents oversized rules files from blowing the context window."
        source_ref: "config.schema.json (project_doc_max_bytes)"
        graduation_candidate: false
        provider_field: "project_doc_max_bytes"
        conversion: dropped
    loading_model: >
      Codex reads AGENTS.md (or configured fallback filenames) by scanning ancestors of the
      current working directory and the user home directory. Multiple AGENTS.md files across
      the hierarchy are discovered and combined. The primary filename is AGENTS.md; a fallback
      list can be configured in config.toml via project_doc_fallback_filenames (ordered). File
      content is capped at project_doc_max_bytes bytes. When the child_agents_md feature flag is
      enabled, codex emits additional hierarchy guidance about scope and precedence. Rules content
      is injected into the system/user instructions context at session start.
    notes: >
      Codex uses AGENTS.md as its native rules format, which is now a widely-adopted cross-provider
      convention. The rules-0 source (docs/agents_md.md) is a short redirect to the external docs
      site rather than a substantive spec. The rules-1 source (AGENTS.md at repo root) is the
      Codex codebase's own AGENTS.md for AI contributors and shows the format in practice. The
      config schema confirms project_doc_fallback_filenames and project_doc_max_bytes as the
      primary configuration surface for rules loading. The hierarchical_agents_md extension is
      flagged graduation_candidate: true because hierarchical / scoped rules merging is a pattern
      that could be useful across providers.

