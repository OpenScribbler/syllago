      server can be toggled via the UI. MCP configuration is not part of the model context
      directly — the configured tools become available to Cascade as callable tools.
    notes: >
      Windsurf's MCP config format uses the mcpServers key (matches Claude Desktop / standard
      MCP config schema). The config file lives at ~/.codeium/windsurf/mcp_config.json.
      Windsurf supports tools, resources, and prompts from MCP servers. Enterprise users must
      manually enable MCP via settings. The provider does not assume liability for MCP tool
      call failures since tool implementations are written by arbitrary server authors.

  agents:
    status: unsupported
    sources: []
    canonical_mappings: {}
    provider_extensions: []
    notes: >
      Windsurf has no installable-agent harness. The AGENTS.md support documented at
      https://docs.windsurf.com/windsurf/cascade/agents-md.md is a rules delivery
      mechanism that piggybacks on the Rules engine — root-level AGENTS.md files are
      always-on and subdirectory files are subtree-scoped, but these are not invocable
      agents and have no structured definition, tool restrictions, or orchestration.
      AGENTS.md recognition is represented under content_types.rules.cross_provider_recognition,
      not as an agents-content-type. Reassess if Windsurf adds a dedicated custom-agent
      format (equivalent to Cursor's .cursor/agents/ or Factory's custom droids).

