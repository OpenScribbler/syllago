      (PreToolUse, PostToolUse, SessionStart, etc.) are Pascal-case. Claude Code's native tool names
      in matchers are the internal tool identifiers (Bash, Edit, Write, Read, Glob, Grep, Agent,
      WebFetch, WebSearch, AskUserQuestion, ExitPlanMode, mcp__<server>__<tool>). Syllago's canonical
      format uses snake_case event names and descriptive tool names; the toolmap.go translation layer
      handles the conversion.

