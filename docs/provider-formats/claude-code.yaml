      Built-in commands are always available; their availability may depend on platform, plan, and
      environment (e.g., /desktop only on macOS/Windows, /upgrade only on Pro/Max). Custom commands
      load at session start from .claude/commands/ (project) and ~/.claude/commands/ (user).
      MCP prompt commands are discovered dynamically from connected MCP servers. All commands appear
      in the / menu accessible by typing / in a session.
    notes: >
      Custom commands and skills are the same mechanism under different names; .claude/commands/ is
      the legacy path while .claude/skills/ (with SKILL.md per-skill) is the current approach with
