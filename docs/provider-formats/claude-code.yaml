generation_method: subagent

content_types:
  skills:
    status: supported
    sources:
      - uri: "https://code.claude.com/docs/en/skills.md"
        type: documentation
        fetch_method: md_url
        content_hash: "sha256:3fc5a05bcf658a22a243aaf6714fff07f320c88ded7e8bc2aa290bb10fe742b5"
        fetched_at: "2026-04-11T21:49:46Z"
    canonical_mappings:
      display_name:
        supported: true
        mechanism: "yaml frontmatter key: name (optional, falls back to directory name)"
        confidence: confirmed
      description:
        supported: true
        mechanism: "yaml frontmatter key: description (recommended)"
        confidence: confirmed
      disable_model_invocation:
        supported: true
        mechanism: "yaml frontmatter key: disable-model-invocation (optional bool, default false)"
        confidence: confirmed
      user_invocable:
        supported: true
        mechanism: "yaml frontmatter key: user-invocable (optional bool, default true)"
        confidence: confirmed
      project_scope:
        supported: true
        mechanism: ".claude/skills/<skill-name>/SKILL.md committed to version control"
        paths:
          - ".claude/skills/<skill-name>/SKILL.md"
        confidence: confirmed
      global_scope:
        supported: true
        mechanism: "~/.claude/skills/<skill-name>/SKILL.md in user home directory"
        paths:
          - "~/.claude/skills/<skill-name>/SKILL.md"
        confidence: confirmed
      shared_scope:
        supported: true
        mechanism: "Managed settings deployment for organization-wide distribution"
        confidence: confirmed
      canonical_filename:
        supported: true
        mechanism: "Fixed filename SKILL.md required inside skill directory"
        confidence: confirmed
      custom_filename:
        supported: true
        mechanism: "Variable directory name: .claude/skills/<name>/SKILL.md — directory name is the skill identifier"
        confidence: confirmed
    provider_extensions:
      - id: supporting_files
        name: Supporting Files
        description: >
          Skills can include multiple files in their directory beyond SKILL.md. The main SKILL.md
          acts as an entrypoint that references templates, example outputs, scripts, and detailed
          reference documentation stored as sibling files or subdirectories. Claude loads these
          on demand rather than upfront, keeping context lean. The built-in variable
          ${CLAUDE_SKILL_DIR} expands to the skill's directory so scripts and bundled assets can
          be referenced portably regardless of the current working directory.
        source_ref: "https://code.claude.com/docs/en/skills.md#add-supporting-files"
        graduation_candidate: true

      - id: auto_invocation
        name: Description-Based Auto-Invocation
        description: >
          Claude reads all skill descriptions at session start and automatically invokes relevant
          skills when the conversation matches their description. This is the default behavior;
          setting disable-model-invocation: true opts out. When disable-model-invocation is false
          (default), the skill's description is always present in Claude's context so it can match
          requests. When true, the description is removed from context entirely and the skill only
          runs when the user explicitly types /skill-name.
        source_ref: "https://code.claude.com/docs/en/skills.md#control-who-invokes-a-skill"
        graduation_candidate: true

      - id: argument_hint
        name: Argument Hint
        description: >
          Frontmatter field argument-hint provides a hint string shown during autocomplete to
          indicate expected arguments for a skill. Example values: "[issue-number]" or
          "[filename] [format]". This is purely presentational and does not affect argument
          parsing or validation.
        source_ref: "https://code.claude.com/docs/en/skills.md#frontmatter-reference"
        graduation_candidate: false

      - id: allowed_tools
        name: Allowed Tools Pre-Approval
        description: >
          Frontmatter field allowed-tools grants permission for the listed tools while the skill
          is active, so Claude can use them without prompting the user for per-use approval. It
          does not restrict which tools are available — all tools remain callable. Accepts a
          space-separated string or a YAML list. Individual tool calls can be scoped using
          parenthetical syntax (e.g., Bash(git commit *)).
        source_ref: "https://code.claude.com/docs/en/skills.md#pre-approve-tools-for-a-skill"
        graduation_candidate: false

      - id: model_override
        name: Per-Skill Model Override
        description: >
          Frontmatter field model specifies which model to use when this skill is active. Overrides
          the session model for the duration of the skill execution.
        source_ref: "https://code.claude.com/docs/en/skills.md#frontmatter-reference"
        graduation_candidate: false

      - id: effort_override
        name: Per-Skill Effort Level
        description: >
          Frontmatter field effort overrides the session effort level when this skill is active.
          Options: low, medium, high, max (max requires Opus 4.6). Default inherits from the
          session effort level.
        source_ref: "https://code.claude.com/docs/en/skills.md#frontmatter-reference"
        graduation_candidate: false

      - id: subagent_execution
        name: Subagent Execution via context fork
        description: >
          Frontmatter field context: fork runs the skill in an isolated subagent context. The
          skill content becomes the prompt that drives the subagent; it has no access to
          conversation history. The companion field agent specifies which subagent type to use
          (built-in types: Explore, Plan, general-purpose; or any custom subagent from
          .claude/agents/). If agent is omitted, uses general-purpose. This is the inverse of
          defining a subagent that preloads skills — here the skill drives the subagent rather
          than the subagent referencing the skill.
        source_ref: "https://code.claude.com/docs/en/skills.md#run-skills-in-a-subagent"
        graduation_candidate: false

      - id: skill_scoped_hooks
        name: Skill-Scoped Lifecycle Hooks
        description: >
          Frontmatter field hooks attaches hooks scoped to the skill's lifecycle events. These
          hooks fire around tool events while the skill is active and follow the same configuration
          format as session-level hooks. Useful for enforcing invariants or logging during a
          specific skill's execution without affecting the rest of the session.
        source_ref: "https://code.claude.com/docs/en/skills.md#frontmatter-reference"
        graduation_candidate: false

      - id: path_activation_filter
        name: Path-Based Activation Filter
        description: >
          Frontmatter field paths accepts glob patterns that limit when Claude auto-activates the
          skill. When set, Claude only loads the skill automatically when working with files that
          match one of the patterns. Uses the same format as path-specific rules in memory
          configuration. Accepts a comma-separated string or a YAML list. User-explicit invocation
          via /skill-name is not restricted by this field.
        source_ref: "https://code.claude.com/docs/en/skills.md#frontmatter-reference"
        graduation_candidate: false

      - id: shell_selection
        name: Per-Skill Shell Selection
        description: >
          Frontmatter field shell selects the shell used for inline command execution blocks
          (!`command` and ```! fenced blocks) within the skill. Accepts bash (default) or
          powershell. Setting powershell runs inline shell commands via PowerShell on Windows and
          requires the environment variable CLAUDE_CODE_USE_POWERSHELL_TOOL=1.
        source_ref: "https://code.claude.com/docs/en/skills.md#frontmatter-reference"
        graduation_candidate: false

      - id: argument_substitution
        name: Argument and Session Variable Substitution
        description: >
          Skills support string substitution for dynamic values in skill content. $ARGUMENTS
          expands to all arguments passed at invocation; if not present, arguments are appended
          as "ARGUMENTS: <value>". $ARGUMENTS[N] and the shorthand $N access specific positional
          arguments (0-based). ${CLAUDE_SESSION_ID} expands to the current session ID.
          ${CLAUDE_SKILL_DIR} expands to the directory containing the skill's SKILL.md, enabling
          portable references to bundled scripts and assets. Multi-word arguments must be quoted
          when invoking.
        source_ref: "https://code.claude.com/docs/en/skills.md#available-string-substitutions"
        graduation_candidate: false

      - id: shell_command_injection
        name: Shell Command Injection for Dynamic Context
        description: >
          The !`<command>` inline syntax and ```! fenced block syntax execute shell commands
          before the skill content is sent to Claude. Command output replaces the placeholder in
          the rendered prompt, so Claude receives live data rather than raw commands. This is
          preprocessing — Claude never sees the original command, only the output. Can be disabled
          organization-wide via the disableSkillShellExecution setting in managed settings, which
          replaces commands with "[shell command execution disabled by policy]". Bundled and managed
          skills are not affected by this setting.
        source_ref: "https://code.claude.com/docs/en/skills.md#inject-dynamic-context"
        graduation_candidate: false

      - id: skill_content_lifecycle
        name: Skill Content Lifecycle and Compaction Behavior
        description: >
          When invoked, skill content enters the conversation as a single message and persists for
          the rest of the session; Claude Code does not re-read the skill file on later turns.
          During auto-compaction, Claude Code re-attaches the most recent invocation of each skill
          after the summary, keeping the first 5,000 tokens of each. All re-attached skills share
          a combined budget of 25,000 tokens, filled starting from the most recently invoked skill,
          so older skills may be dropped entirely when many skills are invoked in one session.
          Subagents with preloaded skills work differently: full skill content is injected at
          startup rather than lazily.
        source_ref: "https://code.claude.com/docs/en/skills.md#skill-content-lifecycle"
        graduation_candidate: false

      - id: nested_directory_discovery
        name: Nested Directory Auto-Discovery
        description: >
          When working with files in subdirectories, Claude Code automatically discovers skills
          from nested .claude/skills/ directories along the path. For example, editing a file in
          packages/frontend/ causes Claude Code to also load skills from
          packages/frontend/.claude/skills/. This supports monorepo setups where individual
          packages define their own skills without requiring centralized configuration.
        source_ref: "https://code.claude.com/docs/en/skills.md#automatic-discovery-from-nested-directories"
        graduation_candidate: false

      - id: add_dir_skills_loading
        name: Additional Directory Skills Loading with Live Reload
        description: >
          The --add-dir flag normally grants file access rather than configuration discovery, but
          .claude/skills/ directories within added directories are an exception: they are loaded
          automatically and support live change detection. Skills edited in an added directory
          during a session are picked up without restarting Claude Code. Other .claude/
          configuration (subagents, commands, output styles) is not loaded from additional
          directories.
        source_ref: "https://code.claude.com/docs/en/skills.md#skills-from-additional-directories"
        graduation_candidate: false

      - id: plugin_scope
        name: Plugin Scope
        description: >
          Skills can be bundled inside a plugin at <plugin>/skills/<skill-name>/SKILL.md. Plugin
          skills use a plugin-name:skill-name namespace, preventing conflicts with personal,
          project, or enterprise skills of the same name. The plugin scope is applied where the
          plugin is enabled. Priority order across scopes: enterprise > personal > project; plugin
          skills occupy a separate namespace and do not participate in this priority ordering.
        source_ref: "https://code.claude.com/docs/en/skills.md#where-skills-live"
        graduation_candidate: false

      - id: skill_permission_rules
        name: Skill Permission Rules
        description: >
          Claude's access to skills can be controlled via permission rules using Skill tool
          syntax. Skill denies the Skill tool entirely. Skill(name) allows or denies an exact
          skill name. Skill(name *) matches a skill name prefix with any arguments. These rules
          integrate with the standard permissions system and can be set in user, project, or
          managed settings. The user-invocable field only controls menu visibility; permission
          rules are required to restrict programmatic invocation by Claude.
        source_ref: "https://code.claude.com/docs/en/skills.md#restrict-claudes-skill-access"
        graduation_candidate: false

      - id: disable_skill_shell_execution_policy
        name: Organization Policy to Disable Shell Execution in Skills
        description: >
          The disableSkillShellExecution setting in managed settings disables shell command
          injection (the !`command` and ```! syntax) for skills from user, project, plugin, and
          additional-directory sources. Each command placeholder is replaced with "[shell command
          execution disabled by policy]" rather than being executed. Bundled and managed skills
          are not affected by this setting. Most useful in managed settings where users cannot
          override it.
        source_ref: "https://code.claude.com/docs/en/skills.md#inject-dynamic-context"
        graduation_candidate: false

      - id: bundled_skills
        name: Bundled Skills
        description: >
          Claude Code ships with a set of built-in prompt-based skills available in every session:
          /simplify, /batch, /debug, /loop, /claude-api, and others. Unlike built-in commands
          which execute fixed logic directly, bundled skills give Claude a detailed playbook and
          let it orchestrate work using its tools. They are listed alongside built-in commands in
          the commands reference, marked "Skill" in the Purpose column. Bundled and managed skills
          are not affected by the disableSkillShellExecution policy.
        source_ref: "https://code.claude.com/docs/en/skills.md#bundled-skills"
        graduation_candidate: false

      - id: description_context_budget
        name: Skill Description Context Budget
        description: >
          All skill names are always loaded into Claude's context at session start. Descriptions
          are also loaded but are subject to a character budget that scales dynamically at 1% of
          the context window, with a fallback of 8,000 characters total. Individual entries are
          capped at 250 characters regardless of the total budget; descriptions longer than 250
          characters are truncated in the listing. The budget can be raised by setting the
          SLASH_COMMAND_TOOL_CHAR_BUDGET environment variable. Skills with disable-model-invocation:
          true have their descriptions excluded from context entirely.
        source_ref: "https://code.claude.com/docs/en/skills.md#skill-descriptions-are-cut-short"
        graduation_candidate: false

      - id: open_standard_compliance
        name: Agent Skills Open Standard Compliance
        description: >
          Claude Code skills follow the Agent Skills open standard (agentskills.io), which is
          designed to work across multiple AI tools. Claude Code extends the standard with
          additional features including invocation control (disable-model-invocation,
          user-invocable), subagent execution (context: fork), and dynamic context injection
          (shell command substitution). The base standard covers skill directory layout, SKILL.md
          entrypoint, and frontmatter fields like name and description.
        source_ref: "https://code.claude.com/docs/en/skills.md"
        graduation_candidate: false

    loading_model: "Lazy — name and description visible to Claude at all times (subject to context budget); SKILL.md body loaded on demand when invoked. When disable-model-invocation is true, the description is also excluded from context. Subagents with preloaded skills are an exception: full skill content is injected at startup."
    notes: "Commands in .claude/commands/ are fully supported and work identically to skills; if a skill and command share the same name, the skill takes precedence. Skills follow the agentskills.io open standard with CC-specific extensions. The Plugin scope uses a plugin-name:skill-name namespace to avoid conflicts."

  rules:
    status: supported
    sources:
      - uri: "https://code.claude.com/docs/en/memory.md"
        type: documentation
        fetch_method: md_url
        content_hash: "sha256:695238a6bc917a949ebe5853cd6c5990d584f5bd04106b271fc444af468d8a63"
        fetched_at: "2026-04-11T21:46:19Z"
    canonical_mappings: {}
    provider_extensions:
      - id: claude_md_files
        name: CLAUDE.md Files
        description: >
          CLAUDE.md files are plain-text markdown files that give Claude persistent instructions across sessions.
          They load at the start of every session and consume context window tokens. Scope is determined by
          file location: managed policy (e.g. /etc/claude-code/CLAUDE.md on Linux/WSL), project
          (./CLAUDE.md or ./.claude/CLAUDE.md, committed to version control and shared with team),
          user (~/.claude/CLAUDE.md, personal across all projects), and local (./CLAUDE.local.md,
          gitignored personal project-specific preferences). All discovered files along the directory
          tree are concatenated into context rather than overriding each other; within each directory,
          CLAUDE.local.md is appended after CLAUDE.md. Subdirectory CLAUDE.md files load on demand
          when Claude reads files in those subdirectories rather than at session start.
          Block-level HTML comments are stripped before injection into Claude's context.
          The /init command generates a starter CLAUDE.md automatically by analyzing the codebase.
        source_ref: "https://code.claude.com/docs/en/memory.md#claude-md-files"
        graduation_candidate: false

      - id: rules_directory
        name: Path-Scoped Rules in .claude/rules/
        description: >
          The .claude/rules/ directory provides modular, optionally path-scoped instruction files.
          Each .md file in this directory covers one topic (e.g., testing.md, api-design.md).
          Files are discovered recursively, so subdirectories like frontend/ or backend/ are supported.
          Rules without a paths frontmatter field load unconditionally at launch, equivalent in priority
          to .claude/CLAUDE.md. Rules with a paths field use YAML frontmatter like
          "paths: [\"src/api/**/*.ts\"]" and only load into context when Claude works with files
          matching those glob patterns, triggering on file access rather than on every tool use.
          Symlinks in .claude/rules/ are supported for sharing rules across projects; circular
          symlinks are detected and handled gracefully. User-level rules in ~/.claude/rules/ apply
          to all projects and load before project rules (giving project rules higher effective priority).
        source_ref: "https://code.claude.com/docs/en/memory.md#organize-rules-with-claude/rules/"
        graduation_candidate: false

      - id: file_imports
        name: "@-Import Syntax for CLAUDE.md"
        description: >
          CLAUDE.md files can import additional files using @path/to/import syntax. Imported files
          are expanded and loaded into context at launch alongside the CLAUDE.md that references them.
          Both relative and absolute paths are supported; relative paths resolve relative to the
          importing file, not the working directory. Imported files can recursively import other files
          up to a maximum depth of five hops. The first time Claude Code encounters external imports
          in a project, it shows an approval dialog; if declined, imports are permanently disabled
          for that project without re-prompting. AGENTS.md files from other coding agents can be
          imported with @AGENTS.md so both tools read the same instructions.
        source_ref: "https://code.claude.com/docs/en/memory.md#import-additional-files"
        graduation_candidate: false

      - id: auto_memory
        name: Auto Memory
        description: >
          Auto memory lets Claude accumulate knowledge across sessions without user authorship. Claude
          saves notes for itself (build commands, debugging insights, preferences) to
          ~/.claude/projects/<project>/memory/MEMORY.md, which is derived from the git repository so
          all worktrees share one directory. MEMORY.md acts as an index; detailed notes go into
          topic files (debugging.md, api-conventions.md, etc.) that are not loaded at startup and
          are read on demand. The first 200 lines or 25KB of MEMORY.md load at every session start.
          Auto memory requires Claude Code v2.1.59 or later and is on by default; toggled via
          autoMemoryEnabled in settings or CLAUDE_CODE_DISABLE_AUTO_MEMORY=1 env var.
          The storage location can be overridden with autoMemoryDirectory in user or local settings.
          Subagents can also maintain their own auto memory. Auto memory is machine-local; not
          shared across machines or cloud environments.
        source_ref: "https://code.claude.com/docs/en/memory.md#auto-memory"
        graduation_candidate: false

      - id: claude_md_excludes
        name: Exclude CLAUDE.md Files by Pattern
        description: >
          The claudeMdExcludes setting skips specific CLAUDE.md or rules files by path or glob
          pattern. Useful in large monorepos where ancestor CLAUDE.md files from other teams are
          irrelevant. Patterns match against absolute file paths using glob syntax. Configurable at
          any settings layer (user, project, local, or managed policy); arrays merge across layers.
          Managed policy CLAUDE.md files cannot be excluded and always apply.
        source_ref: "https://code.claude.com/docs/en/memory.md#exclude-specific-claude-md-files"
        graduation_candidate: false

      - id: add_dir_rules_loading
        name: Rules Loading from Additional Directories via Environment Variable
        description: >
          By default, CLAUDE.md files from directories added with --add-dir are not loaded. Setting
          the CLAUDE_CODE_ADDITIONAL_DIRECTORIES_CLAUDE_MD=1 environment variable enables loading
          CLAUDE.md, .claude/CLAUDE.md, and .claude/rules/*.md from additional directories.
          CLAUDE.local.md files in additional directories are not loaded even with this env var.
        source_ref: "https://code.claude.com/docs/en/memory.md#load-from-additional-directories"
        graduation_candidate: false

      - id: managed_org_claude_md
        name: Organization-Wide Managed CLAUDE.md
        description: >
          Organizations can deploy a centrally managed CLAUDE.md via MDM, Group Policy, Ansible, or
          similar tools to system-wide locations (macOS:
          /Library/Application Support/ClaudeCode/CLAUDE.md; Linux/WSL: /etc/claude-code/CLAUDE.md;
          Windows: C:\Program Files\ClaudeCode\CLAUDE.md). This file cannot be excluded by individual
          settings and always applies to all users on the machine. Distinct from managed settings:
          managed CLAUDE.md provides behavioral guidance to Claude while managed settings enforce
          technical rules (tool denies, sandbox, permission modes).
        source_ref: "https://code.claude.com/docs/en/memory.md#deploy-organization-wide-claude-md"
        graduation_candidate: false

    loading_model: >
      CLAUDE.md files along the directory tree from the working directory upward load in full at
      session start. Subdirectory CLAUDE.md files load on demand when Claude reads files in those
      subdirectories. Path-scoped .claude/rules/ files load when Claude accesses matching files.
      MEMORY.md loads its first 200 lines or 25KB at session start; topic files load on demand.
      No size limit applies to CLAUDE.md files (though shorter files produce better adherence;
      target under 200 lines). Files are concatenated, not overridden; within each directory
      CLAUDE.local.md is appended after CLAUDE.md. Scope priority (most specific wins): managed
      policy > user > project > local (for conflicting instructions within the same session context).
    notes: >
      The CLAUDE.md mechanism is the primary way to encode persistent rules for Claude Code. The
      .claude/rules/ directory with path-scoped files is the recommended structure for larger projects.
      Auto memory and CLAUDE.md serve complementary purposes: CLAUDE.md for human-authored instructions,
      auto memory for Claude's self-accumulated learnings. The /memory command provides an in-session
      browser for all loaded instruction files.

