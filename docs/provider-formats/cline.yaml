        content_hash: "sha256:1d49400f76874ca05a277397e510a77c7cad68ac7477638b1c39d4e3e17d99f9"
        fetched_at: "2026-04-11T21:49:46Z"
    canonical_mappings:
      display_name:
        supported: true
        mechanism: "yaml frontmatter key: name (required) — must exactly match the directory name"
        confidence: confirmed
      description:
        supported: true
        mechanism: "yaml frontmatter key: description (required) — tells Cline when to use this skill, max 1024 characters"
