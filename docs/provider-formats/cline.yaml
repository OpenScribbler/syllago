      - id: rule_toggle
        name: Per-Rule Enable/Disable Toggle
        summary: "UI toggle in the Rules panel to enable or disable each rule file without deleting it."
        source_ref: "https://docs.cline.bot/customization/rules#toggling-rules"
        graduation_candidate: false
        conversion: not-portable
      - id: conditional_rules_paths
        name: Conditional Rules via YAML Frontmatter paths
        summary: "YAML frontmatter `paths` (glob array) gates rule activation to matching files; empty array disables, missing frontmatter is always-on."
        source_ref: "https://docs.cline.bot/customization/rules#conditional-rules"
        graduation_candidate: true
        provider_field: "paths"
        conversion: embedded
      - id: newrule_slash_command
        name: /newrule Slash Command for Interactive Rule Creation
        summary: "Built-in /newrule command guides the user through creating a .clinerules file interactively."
        source_ref: "https://docs.cline.bot/customization/rules#creating-rules"
        graduation_candidate: false
        conversion: not-portable
    loading_model: >
      All .md and .txt files inside .clinerules/ are processed and combined into a unified
      rule set at task start. Numeric prefixes (e.g., 01-coding.md) are optional and used
      for organization only. When both workspace (.clinerules/) and global rules exist, Cline
      combines them with workspace rules taking precedence on conflict. Conditional rules with
      YAML frontmatter are evaluated against current context and loaded only when a path
      pattern matches. Rules consume context tokens on every request — Cline recommends
      keeping rules concise and linking to external docs rather than embedding large
      style guides.
    notes: "Global rules directory is ~/Documents/Cline/Rules on macOS/Linux and Documents\\Cline\\Rules on Windows. Linux/WSL may also use ~/Cline/Rules. Workspace rules (.clinerules/) take precedence over global rules when they conflict."

