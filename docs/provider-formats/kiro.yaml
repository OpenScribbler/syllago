        name: "Resources attachment (files, skills, knowledge-base)"
        description: "Agents can declare a 'resources' array attaching contextual inputs: individual files (type: file, path), skills/powers (type: skill, name), or knowledge-base entries (type: knowledge-base, name). Resources are loaded into the agent's context alongside its system prompt."
