      - id: kiro_keywords
        name: "keywords frontmatter field"
        description: "An array of activation trigger words used by Kiro's automatic power-loading system (e.g. [\"database\", \"postgres\", \"auth\"])."
        source_ref: "https://kiro.dev/docs/powers/create/"
        graduation_candidate: true
        graduation_notes: "Confirmed cross-provider concept — listed in graduation issue #73 as auto_invocation_signal."
      - id: steering_files
        name: "steering/ directory"
        description: "An optional steering/ subdirectory inside the power directory containing workflow-specific guidance files (.md). For complex powers, the POWER.md maps each workflow to a specific steering file (e.g., 'Setting up a database → database-setup-workflow.md'). Kiro loads only the relevant steering file on-demand based on what the user is working on, preventing context overload. Simple powers include all guidance directly in POWER.md instead."
