        supported: false
        mechanism: "Kiro steering files are project-scoped; no multi-level subdirectory hierarchy documented"
        confidence: inferred
    provider_extensions:
      - id: kiro_steering_inclusion_mode
        name: "Inclusion mode frontmatter field"
        description: "Controls when a steering file is loaded into context. Four modes: 'always' (default — included in every agent interaction), 'conditional' (loaded when the current file matches a 'globs' frontmatter pattern), 'manual' (only loaded when the user explicitly requests it), 'auto' (Kiro decides based on relevance, similar to model-driven auto-invocation). The 'conditional' and 'auto' modes enable selective context loading to avoid context overload."
        source_ref: "https://kiro.dev/docs/steering/"
        graduation_candidate: true
        graduation_notes: "Conditional (glob-gated) and auto (model-driven) inclusion modes are plausibly cross-provider useful — analogous to rule activation signals in other providers."
      - id: kiro_steering_file_references
        name: "File references (@path/to/file) in steering files"
        description: "Steering files can include references to other files using '@path/to/file' syntax, causing Kiro to inline the referenced file's content into the steering context. Enables modular steering composition without duplicating content."
        source_ref: "https://kiro.dev/docs/steering/"
        graduation_candidate: false
        graduation_notes: "Reference syntax is Kiro-specific — other providers use different mechanisms for including external file content."
      - id: kiro_foundational_steering
        name: "Foundational steering files (auto-created)"
        description: "Kiro automatically creates three foundational steering files on workspace initialization: product_requirements.md, tech_stack.md, and architecture.md. These serve as a structured project context baseline and are created by Kiro, not the user."
        source_ref: "https://kiro.dev/docs/steering/"
        graduation_candidate: false
        graduation_notes: "Auto-created project scaffold is IDE-specific behavior with no direct cross-provider equivalent."
      - id: kiro_agents_md_recognition
        name: "AGENTS.md root file recognition"
        description: "Kiro recognizes AGENTS.md in the repo root as a steering source, consistent with the cross-provider AGENTS.md convention. Treated as a workspace-scoped steering file alongside .kiro/steering/ content."
        source_ref: "https://kiro.dev/docs/steering/"
        graduation_candidate: false
        graduation_notes: "AGENTS.md recognition is already a cross-provider standard, not a Kiro extension."
    loading_model: "Steering files in .kiro/steering/ (workspace) or ~/.kiro/steering/ (global) are evaluated per-interaction based on their inclusion mode. 'always' files are injected into every agent context. 'conditional' files are injected only when the active file matches the frontmatter 'globs' pattern. 'auto' files are loaded at model discretion based on relevance. 'manual' files require explicit user invocation. Workspace steering overrides global steering on conflict. AGENTS.md in the repo root is also recognized as a steering source."
    notes: "Kiro calls this content type 'steering' (not 'rules'). Three scope types exist: workspace (.kiro/steering/), global (~/.kiro/steering/), and 'team' (workspace files tracked in version control — same path as workspace, distinguished by intent). Workspace overrides global on conflict. The inclusion mode system is the primary mechanism for context-sensitive rule loading."

