        name: "autoApprove per-server tool list (or wildcard)"
        description: "Each mcpServers entry can include an 'autoApprove' field: either an array of specific tool names to auto-approve without user confirmation, or the string '*' to auto-approve all tools on that server. This is per-server granularity, more fine-grained than a global approve-all setting."
