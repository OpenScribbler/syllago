    notes: >
      Skill names must be unique per scope. Per the documented precedence list, user-wide
      (~/.config/agents/skills/) skills have higher priority than project-specific (.agents/skills/)
      skills — note: the source prose says "project-specific takes priority over user-wide" but
      the explicit precedence list contradicts this; the list is treated as authoritative.
      Project skills in .agents/skills/ can be committed to git so the whole team gets them
      automatically. Cross-agent compat paths (.claude/skills/, ~/.claude/skills/) are discovered
      but at lower precedence than amp-native paths.
