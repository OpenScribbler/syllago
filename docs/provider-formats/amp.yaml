      application project. Both confirm the AGENT.md filename and plain-Markdown-at-project-root
      pattern. A third source (https://ampcode.com/manual/AGENTS.md) returned 404 at fetch time
      and was skipped. Formal Amp documentation for the rules/AGENT.md format has not been
      confirmed from official docs; all entries here are inferred from example content.
