    provider_extensions:
      - id: mcp_bundling
        name: "MCP server bundling"
        description: "Skills can include an mcp.json file to bundle an MCP server. The server starts when Amp launches but its tools remain hidden until the skill is loaded, keeping the tool list clean. Supports local command-based servers (command, args, env fields) and remote HTTP servers (url, headers fields). The optional includeTools field filters which tools are exposed."
        source_ref: "https://ampcode.com/manual/agent-skills.md"
        graduation_candidate: false
      - id: toolbox_bundling
        name: "Executable tool bundling via toolbox/"
        description: "Skills can bundle executable tools by placing them in a toolbox/ subdirectory within the skill directory. These executables are auto-discovered and registered as tools when the skill is loaded. They follow the same stdin/stdout JSON contract as standalone toolbox tools. Tools from skills are hidden until the skill is loaded."
        source_ref: "https://ampcode.com/manual/agent-skills.md"
        graduation_candidate: false
      - id: bundled_resources
        name: "Bundled passive resources"
        description: "Skills can include arbitrary files (scripts, templates, config files, etc.) in the same directory as SKILL.md. The agent can access these files at paths relative to the skill file. This is distinct from toolbox/ executables — bundled resources are passive files read by the agent, not registered tools."
        source_ref: "https://ampcode.com/manual/agent-skills.md"
        graduation_candidate: true
      - id: skill_cli
        name: "CLI and command palette skill management"
        description: "Skills are managed via the 'amp skill' CLI command and the command palette (Ctrl+O in CLI, Cmd+Shift+P in VS Code). Supported operations: 'skill: add' (install from GitHub URL, git URL, or local path), 'skill: list' (view installed skills), 'skill: remove' (remove a skill). The add command accepts shorthand GitHub paths (e.g., ampcode/amp-contrib/tmux)."
        source_ref: "https://ampcode.com/manual/agent-skills.md"
        graduation_candidate: false
      - id: auto_invocation
        name: "Automatic model-driven invocation"
        description: "The model automatically invokes a skill when the user's request matches the skill's name and description. Both frontmatter fields are always visible to the model at startup and determine when it selects the skill — the full SKILL.md body is only loaded once invoked. This is the primary invocation path; users describe what they want and the model selects the matching skill without explicit syntax."
        source_ref: "https://ampcode.com/manual/agent-skills.md"
        graduation_candidate: true
    loading_model: "Lazy — name and description (frontmatter) are always visible to the model and loaded at startup; SKILL.md body is loaded on demand when the skill is invoked. MCP tools and toolbox executables bundled in a skill remain hidden until the skill is loaded. Skill precedence order (first wins): ~/.config/agents/skills/, ~/.config/amp/skills/, .agents/skills/, .claude/skills/, ~/.claude/skills/, then plugins, toolbox directories, and built-in skills."
    notes: >
      Skill names must be unique per scope. Per the documented precedence list, user-wide
      (~/.config/agents/skills/) skills have higher priority than project-specific (.agents/skills/)
      skills — note: the source prose says "project-specific takes priority over user-wide" but
      the explicit precedence list contradicts this; the list is treated as authoritative.
      Project skills in .agents/skills/ can be committed to git so the whole team gets them
      automatically. Cross-agent compat paths (.claude/skills/, ~/.claude/skills/) are discovered
      but at lower precedence than amp-native paths.
