    canonical_mappings: {}
    provider_extensions:
      - id: canonical_filename
        name: "Canonical filename: AGENT.md"
        description: "Amp rules files are named AGENT.md. The filename is fixed — no frontmatter, no directory wrapper. The file contains plain Markdown with behavioral instructions, coding conventions, workflow guidelines, and any other context the agent should follow when working in the project."
        source_ref: "https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/guides/agent-file/AGENT.md"
        graduation_candidate: false
      - id: project_scope
        name: "Project-scope placement at repository root"
        description: "AGENT.md is placed at the root of the project repository. It is project-scoped: the instructions apply when Amp operates within that project. The file can be committed to version control so the whole team benefits from the same guidelines."
        source_ref: "https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/guides/agent-file/AGENT.md"
        graduation_candidate: false
      - id: plain_markdown_content
        name: "Plain Markdown, no frontmatter"
        description: "AGENT.md contains plain Markdown only — no YAML frontmatter, no structured metadata fields. Sections are organized with Markdown headings. Typical content observed includes: build commands and scripts, architecture and directory layout, code style and conventions, testing methodology (e.g., TDD requirements), PR workflow rules, tool and dependency notes, and any team-specific behavioral instructions for the AI."
        source_ref: "https://raw.githubusercontent.com/sourcegraph/amp-examples-and-guides/main/guides/agent-file/AGENT.md"
        graduation_candidate: false
    loading_model: "AGENT.md is loaded when Amp operates within the project directory. The full file content is provided as context to the agent. No lazy loading or frontmatter-first strategy is described — the entire file is treated as behavioral instructions."
    notes: >
      The two sources are example AGENT.md files, not formal Amp documentation for the rules format.
      rules-0 is the amp-examples-and-guides repository's own AGENT.md (repo build/architecture/style
      guidance). rules-1 is a guide demonstrating TDD, TypeScript, and PR conventions for an
      application project. Both confirm the AGENT.md filename and plain-Markdown-at-project-root
      pattern. A third source (https://ampcode.com/manual/AGENTS.md) returned 404 at fetch time
      and was skipped. Formal Amp documentation for the rules/AGENT.md format has not been
      confirmed from official docs; all entries here are inferred from example content.
