# --- Open design questions ---
#
# 1. Path templates: {home} and {project} as placeholders, or separate fields
#    for user-scope vs project-scope paths?
#
# 2. Platform-specific paths: Cline's MCP settings path differs by OS
#    (macOS/Windows/Linux). How to represent?
#    Option A: platform map under discovery
#    Option B: separate platform_paths field
#    Option C: keep platform logic in Go, only put the "normal" path in YAML
#
# 3. Cross-tool compatibility reads: Zed reads .cursorrules and CLAUDE.md,
#    Cline reads .cursorrules and .windsurfrules. Should discovery paths
#    include these, or should that be a separate "compat_reads" field?
#
# 4. Hooks detail level: Do we include full I/O schemas per event, or just
#    event names? Full schemas would make the capability files very large.
#    Could reference the source manifests for schema URLs.
#
# 5. Tool name mappings: The converter needs to map tool names between providers
#    (e.g., CC's "Bash" → Gemini's "run_shell_command"). Where does this live?
#    Option A: In the capability file per provider
#    Option B: In a separate cross-provider mapping file
#
# 6. Loadouts: They're meta-content. Do they need capability data, or is
#    "supported: true/false" enough?
