# Capability Schema — Draft
# This is a design exploration, not a committed schema.
# One file per provider, lives in docs/provider-capabilities/ (or similar).
# go generate produces Go provider definitions from these files.

# --- Example: Claude Code ---

slug: claude-code
display_name: Claude Code
vendor: Anthropic
config_dir: .claude

# How to detect if this provider is installed on the system.
# Each entry is checked in order; first match wins.
detect:
  - type: directory
    path: "{home}/.claude"

# Where syllago emits consolidated context for this provider.
emit_path: "{project}/CLAUDE.md"

# Per content type capabilities.
# Each entry defines: install method, paths, format, symlink support, discovery.
content_types:

  rules:
    supported: true
    file_format: md
    install:
      method: filesystem       # filesystem | json-merge | project-scope
      path: "{home}/.claude/rules"
    symlink: true
    discovery:
      - "{project}/CLAUDE.md"
      - "{project}/.claude/rules"

  hooks:
    supported: true
    file_format: json
    install:
      method: json-merge
      # json-merge targets are discovered via discovery paths
    symlink: false
    discovery:
      - "{project}/.claude/settings.json"
    # --- Dynamic capability data (Layer 2, but baked into binary via codegen) ---
    events:
      - PreToolUse
      - PostToolUse
      - SessionStart
      - SessionEnd
      - UserPromptSubmit
      - Stop
      - PreCompact
      - PostCompact
      - Notification
      - SubagentStart
      - SubagentStop
      - PermissionRequest
      - WorktreeCreate
      - WorktreeRemove
      - FileChanged
      - TeammateIdle
      - TaskCreated
      - TaskCompleted
      - ConfigChange
      - InstructionsLoaded
      - CwdChanged
      - Elicitation
      - ElicitationResult
      - StopFailure
      - PrePlanModeTransition
      - PostPlanModeTransition
    hook_types: [command]
    config_location: ".claude/settings.json"

  mcp:
    supported: true
    file_format: json
    install:
      method: json-merge
    symlink: false
    discovery:
      - "{project}/.claude.json"
      - "{project}/.mcp.json"
    transports: [stdio, sse, streamable-http]
    config_location: ".mcp.json"

  skills:
    supported: true
    file_format: md
    install:
      method: filesystem
      path: "{home}/.claude/skills"
    symlink: true
    discovery:
      - "{project}/.claude/skills"
    frontmatter: [name, description]  # YAML frontmatter fields in SKILL.md

  agents:
    supported: true
    file_format: md
    install:
      method: filesystem
      path: "{home}/.claude/agents"
    symlink: true
    discovery:
      - "{project}/.claude/agents"
    frontmatter: [name, description]

  commands:
    supported: true
    file_format: md
    install:
      method: filesystem
      path: "{home}/.claude/commands"
    symlink: true
    discovery:
      - "{project}/.claude/commands"
    frontmatter: [name, description]

  loadouts:
    supported: true
    # Loadouts are meta-content — they reference other types.
    # No install path or discovery of their own.


