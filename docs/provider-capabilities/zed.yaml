schema_version: "1"
slug: zed
display_name: ""
last_verified: ""
content_types:
  agents:
    supported: true
    capabilities:
      per_agent_mcp:
        supported: true
        mechanism: per-profile MCP context server scoping (AgentProfileSettings.context_servers IndexMap<server_id, ContextServerPreset> with per-tool granularity), documented under 'MCP Tool Permissions' heading
        confidence: inferred
      tool_restrictions:
        supported: true
        mechanism: per-profile tool toggle map (AgentProfileSettings.tools IndexMap<tool_name, bool>) with default + per-tool override semantics, documented under 'Default Tool Permissions' / 'Per-tool Permission Rules' / 'Pattern Precedence' headings
        confidence: inferred
  mcp:
    supported: true
    capabilities:
      marketplace:
        supported: true
        mechanism: in-IDE MCP server marketplace via Zed's extension catalog documented under 'As Extensions' (vs 'As Custom Servers') sub-heading of 'Installing MCP Servers'
        confidence: inferred
      tool_filtering:
        supported: true
        mechanism: per-tool permission control documented under 'Tool Permissions' heading
        confidence: inferred
  rules:
    supported: true
    capabilities:
      activation_mode:
        supported: true
        capabilities:
          always_on:
            supported: true
            mechanism: project-root .rules file (or first-match fallback name) auto-included in every Agent Panel interaction; Library entries marked as Default Rules also load always_on (documented under '.rules files' / 'Default Rules')
            confidence: inferred
          slash_command:
            supported: true
            mechanism: Library rules invoked via slash command to inject the rule into the current agent context (documented under 'Slash Commands in Rules')
            confidence: inferred
