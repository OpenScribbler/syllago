schema_version: "1"
slug: windsurf
display_name: ""
last_verified: ""
content_types:
  hooks:
    supported: true
    capabilities:
      hook_scopes:
        supported: true
        mechanism: three-tier config scopes documented under 'System-Level' / 'User-Level' / 'Workspace-Level' headings
        confidence: inferred
      json_io_protocol:
        supported: true
        mechanism: JSON event context delivered via stdin documented under 'Common Input Structure' heading
        confidence: inferred
  mcp:
    supported: true
    capabilities:
      enterprise_management:
        supported: true
        mechanism: organization-level MCP admin controls (whitelist, custom registries, regex matching) documented under 'Admin Controls (Teams & Enterprises)' / 'Admin Configuration Guidelines' headings
        confidence: inferred
      env_var_expansion:
        supported: true
        mechanism: ${env:VAR_NAME} and ${file:/path} interpolation documented under 'Config Interpolation' heading
        confidence: inferred
      marketplace:
        supported: true
        mechanism: in-IDE MCP marketplace documented under 'MCP Registry' / 'Configuring Custom Registries' headings
        confidence: inferred
      tool_filtering:
        supported: true
        mechanism: per-server tool filtering documented under 'Configuring MCP tools' (UI tool toggles, 100-tool cap) and 'MCP Whitelist' (admin-side regex matching) headings
        confidence: inferred
      transport_types:
        supported: true
        mechanism: transport types (stdio for local, Streamable HTTP and SSE for remote) documented under 'Remote HTTP MCPs' heading; remote servers use serverUrl/url instead of command/args
        confidence: inferred
  rules:
    supported: true
    capabilities:
      activation_mode:
        supported: true
        capabilities:
          always_on:
            supported: true
            mechanism: always_on trigger value documented in 'Activation Modes' table — full rule content included in system prompt every message
            confidence: inferred
          glob:
            supported: true
            mechanism: glob trigger value documented in 'Activation Modes' table — activated when files matching glob pattern are in context
            confidence: inferred
          manual:
            supported: true
            mechanism: manual trigger value documented in 'Activation Modes' table — activated via @-mention
            confidence: inferred
          model_decision:
            supported: true
            mechanism: model_decision trigger value documented in 'Activation Modes' table — Cascade decides based on context
            confidence: inferred
      auto_memory:
        supported: true
        mechanism: Cascade-managed Memories layer auto-writes context based on conversation (documented under 'Memories & Rules' / 'How to Manage Memories')
        confidence: inferred
      cross_provider_recognition:
        supported: true
        capabilities:
          agents_md:
            supported: true
            mechanism: AGENTS.md fallback documented in dedicated rules.1 doc with 'Comparison with Rules' section
            confidence: inferred
      hierarchical_loading:
        supported: true
        mechanism: .windsurf/rules scanned in current workspace, sub-directories, and parent dirs up to git root (documented under 'Rules Discovery' / 'Rules Storage Locations')
        confidence: inferred
