      hierarchical_loading:
        supported: true
        mechanism: 'four-tier scope: Repository-wide + Path-specific + Agent (AGENTS.md) + Local ($HOME/.copilot/copilot-instructions.md) — files merge across tiers (documented under ''Repository-wide'' / ''Path-specific'' / ''Agent instructions'' / ''Local instructions'')'
