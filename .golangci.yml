version: "2"

# Linter configuration for pre-release code quality.
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - gocyclo
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      # fmt.Fprint* writing to stdout/stderr almost never fails in CLI tools,
      # and checking the error adds noise without value.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (fmt.State).Write
        - (*strings.Builder).WriteString
        - (*strings.Builder).WriteRune
        - (*strings.Builder).WriteByte
    gocyclo:
      # Bubbletea Update() methods and CLI command runners inherently have
      # high cyclomatic complexity due to message/flag dispatch patterns.
      # 50 catches genuinely problematic functions without flagging idiomatic TUI code.
      min-complexity: 50

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
