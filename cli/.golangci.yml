version: "2"

# Linter configuration for pre-release code quality.
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - gocyclo
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      # CLI output, string builders, and scan helpers — errors are not actionable.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fscan
        - fmt.Fscanf
        - fmt.Fscanln
        - fmt.Scanln
        - fmt.Sscanf
        - (fmt.State).Write
        - (*strings.Builder).WriteString
        - (*strings.Builder).WriteRune
        - (*strings.Builder).WriteByte
        - (*os.File).Write
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
    gocyclo:
      min-complexity: 50
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo
      - path: internal/tui/
        linters:
          - gocyclo

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
